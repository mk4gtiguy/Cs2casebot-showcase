<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>🏃  Live Race — CS2CaseBot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{--bg:#06080a;--gold:#ffd700;--green:#22c55e;--red:#ef4444;--font:'Orbitron',monospace;}

html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#c8d8e0;}

body{background-image:radial-gradient(ellipse 100% 30% at 50% 0%,rgba(255,215,0,0.04) 0%,transparent 60%);}



.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(6,8,10,0.98);border-bottom:1px solid rgba(255,215,0,0.1);position:sticky;top:0;z-index:50;}

.back{display:flex;align-items:center;gap:5px;color:#2a3040;font-size:10px;letter-spacing:1px;text-decoration:none;transition:color .2s;}

.back:hover{color:var(--gold);}

.back svg{width:14px;height:14px;}

.title{flex:1;font-size:14px;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,var(--gold),#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.bal{font-size:13px;font-weight:700;color:var(--gold);font-family:monospace;}



.page{max-width:480px;margin:0 auto;padding:16px 14px 80px;}



/* PHASE BANNER */

.phase-banner{text-align:center;padding:10px;font-size:11px;font-weight:700;letter-spacing:2px;border-radius:10px;margin-bottom:14px;}

.phase-banner.lobby{background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.15);color:var(--gold);}

.phase-banner.countdown{background:rgba(255,107,0,0.08);border:1px solid rgba(255,107,0,0.2);color:#ff9500;font-size:16px;}

.phase-banner.racing{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);color:var(--green);}

.phase-banner.finished{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.2);color:var(--gold);}

.phase-banner.idle{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:#3a4050;}



/* TRACK */

.track-wrap{background:rgba(4,6,8,0.99);border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:16px 12px;margin-bottom:14px;position:relative;overflow:hidden;}

.track-wrap::before{content:'FINISH';position:absolute;right:12px;top:50%;transform:translateY(-50%) rotate(90deg);font-size:8px;letter-spacing:2px;color:rgba(255,215,0,0.2);pointer-events:none;}

.finish-line{position:absolute;right:14px;top:0;bottom:0;width:2px;background:repeating-linear-gradient(180deg,rgba(255,215,0,0.4) 0px,rgba(255,215,0,0.4) 6px,transparent 6px,transparent 12px);}



/* RACER LANES */

.racer-lane{display:flex;align-items:center;gap:8px;padding:8px 6px;margin-bottom:6px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);position:relative;transition:background .3s;}

.racer-lane.my-lane{border-color:rgba(255,215,0,0.2);background:rgba(255,215,0,0.03);}

.racer-lane.winner-lane{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.06);animation:lane-win .6s ease;}

@keyframes lane-win{0%,100%{}40%{background:rgba(255,215,0,0.12);}}

.lane-emoji{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.lane-img{width:20px;height:20px;object-fit:cover;border-radius:50%;flex-shrink:0;}

.lane-name{font-size:9px;font-weight:700;flex-shrink:0;min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.lane-track{flex:1;height:12px;background:rgba(255,255,255,0.04);border-radius:6px;overflow:hidden;position:relative;}

.lane-fill{height:100%;border-radius:6px;transition:width .1s linear;position:relative;}

.lane-fill.bursting::after{content:'💨';position:absolute;right:-2px;top:-6px;font-size:10px;animation:burst-puff .3s ease forwards;}

@keyframes burst-puff{0%{opacity:1;transform:translateX(0);}100%{opacity:0;transform:translateX(8px);}}

.lane-pct{font-size:8px;font-family:monospace;min-width:34px;text-align:right;color:#446;}

.lane-place{font-size:10px;min-width:20px;text-align:center;font-weight:700;}

.place-1{color:var(--gold);}

.place-2{color:#c0c0c0;}

.place-3{color:#cd7f32;}



/* AGENT SELECTOR */

.agent-section{margin-bottom:14px;}

.agent-label{font-size:9px;letter-spacing:2px;color:#3a4050;margin-bottom:8px;}

.agent-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}

.agent-card{padding:10px 4px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);cursor:pointer;text-align:center;transition:all .2s;}

.agent-card:hover{border-color:rgba(255,255,255,0.15);}

.agent-card.selected{border-width:2px;}

.agent-emoji{font-size:20px;display:block;margin-bottom:4px;}
.agent-img{width:32px;height:32px;object-fit:cover;border-radius:50%;display:block;margin:0 auto 4px;}

.agent-name{font-size:7px;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.agent-trait{font-size:7px;color:#3a4050;margin-top:1px;}



/* RESULT CARDS */

.results-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}

.result-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);}

.result-card.top{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.05);}

.rc-place{font-size:18px;min-width:28px;text-align:center;}

.rc-info{flex:1;}

.rc-name{font-size:10px;font-weight:700;}

.rc-time{font-size:8px;color:#446;font-family:monospace;margin-top:2px;}

.rc-payout{font-size:12px;font-weight:900;color:var(--gold);font-family:monospace;}



/* LOBBY COUNTDOWN */

.lobby-timer{text-align:center;margin-bottom:10px;}

.lt-num{font-size:clamp(32px,10vw,52px);font-weight:900;font-family:monospace;color:var(--gold);}

.lt-label{font-size:9px;letter-spacing:2px;color:#3a4050;margin-top:4px;}



/* REACTION ROW */

.reaction-row{display:flex;justify-content:center;gap:12px;margin-bottom:12px;}

.rxn-btn{font-size:22px;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:8px;transition:transform .15s;}

.rxn-btn:active{transform:scale(1.5);}

.rxn-float{position:fixed;pointer-events:none;font-size:26px;z-index:200;animation:rxn-rise 1.8s ease forwards;}

@keyframes rxn-rise{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-140px) scale(1.5);}}



/* BET CTRL */

.bet-ctrl{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.06);border-radius:14px;padding:14px;}

.bl{font-size:8px;color:#3a4050;letter-spacing:2px;margin-bottom:8px;}

.bet-row{display:flex;gap:8px;margin-bottom:8px;}

.bet-inp{flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(255,215,0,0.1);border-radius:8px;padding:10px 12px;color:#c8d8e0;font-family:var(--font);font-size:13px;font-weight:700;outline:none;text-align:center;}

.bet-inp:focus{border-color:rgba(255,215,0,0.3);}

.adj{padding:10px 14px;background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.08);border-radius:8px;color:#3a4050;font-family:var(--font);font-size:11px;cursor:pointer;transition:all .15s;}

.adj:hover{color:var(--gold);}

.qrow{display:flex;gap:5px;margin-bottom:10px;}

.qb{flex:1;padding:7px 3px;background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.08);border-radius:6px;color:#3a4050;font-size:8px;letter-spacing:1px;cursor:pointer;text-align:center;transition:all .15s;}

.qb:hover{border-color:var(--gold);color:var(--gold);}

.btn-join{width:100%;padding:16px;border:none;border-radius:12px;font-family:var(--font);font-size:13px;font-weight:900;letter-spacing:3px;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#aa6600,var(--gold));color:#06080a;box-shadow:0 4px 20px rgba(255,215,0,0.3);}

.btn-join:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(255,215,0,0.5);}

.btn-join:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}



#confetti{position:fixed;inset:0;pointer-events:none;z-index:200;}

</style>

    <script src="/static/sound.js"></script>

    <script src="/static/big-win.js"></script>


    <script src="/static/balance-animation.js"></script>


    <script src="/static/page-transitions.js"></script>


    <script src="/static/autoplay.js"></script>


<link rel="stylesheet" href="/static/games-shared.css"><script src="/static/js/csrf.js"></script>


</head>

<body>

<canvas id="confetti"></canvas>

<header class="hdr">

  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>

  <span class="title">🏃  LIVE RACE</span>

  <span class="bal" id="balDisplay">$—</span>

</header>



<div class="page">

  <div class="phase-banner idle" id="phaseBanner">SELECT YOUR AGENT AND JOIN A RACE</div>

  <div id="sessionStats" style="display:flex;justify-content:center;gap:16px;margin-bottom:10px;font-size:9px;color:#3a4050;letter-spacing:1px;"></div>



  <!-- TRACK (shown during race) -->

  <div class="track-wrap" id="trackWrap" style="display:none;">

    <div class="finish-line"></div>

    <div id="racerLanes"></div>

  </div>



  <!-- LOBBY TIMER (shown during lobby) -->

  <div id="lobbySection" style="display:none;">

    <div class="lobby-timer">

      <div class="lt-num" id="lobbyTimer">15</div>

      <div class="lt-label">SECONDS UNTIL RACE STARTS</div>

    </div>

    <button onclick="inviteToRace()" style="width:100%;padding:12px;border:none;border-radius:10px;background:rgba(255,255,255,0.08);color:#eee;font-family:var(--font);font-size:11px;font-weight:900;letter-spacing:2px;cursor:pointer;margin-top:12px;">🔗 INVITE FRIENDS</button>

  </div>



  <!-- RESULTS (shown after race) -->

  <div id="resultsSection" style="display:none;">

    <div class="results-grid" id="resultsGrid"></div>

    <button id="raceAgainBtn" onclick="raceAgain()" style="display:none;width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#aa6600,var(--gold));color:#06080a;font-family:var(--font);font-size:12px;font-weight:900;letter-spacing:2px;cursor:pointer;margin-bottom:12px;">🔄 RACE AGAIN</button>

  </div>



  <!-- REACTION ROW (shown during race) -->

  <div class="reaction-row" id="reactionRow" style="display:none;">

    <button class="rxn-btn" onclick="sendReaction('🔥')">🔥</button>

    <button class="rxn-btn" onclick="sendReaction('💨')">💨</button>

    <button class="rxn-btn" onclick="sendReaction('👑')">👑</button>

    <button class="rxn-btn" onclick="sendReaction('😱')">😱</button>

    <button class="rxn-btn" onclick="sendReaction('💀')">💀</button>

    <button class="rxn-btn" onclick="sendReaction('🍀')">🍀</button>

  </div>



  <!-- AGENT SELECT -->

  <div class="agent-section" id="agentSection">

    <div class="agent-label">CHOOSE YOUR AGENT</div>

    <div class="agent-grid" id="agentGrid"></div>

  </div>



  <div class="bet-ctrl">

    <div class="bl">BET AMOUNT</div>

    <div class="bet-row">

      <button class="adj" onclick="halveBet()">½</button>

      <input class="bet-inp" id="betInp" type="number" value="1000" min="100">

      <button class="adj" onclick="doubleBet()">2×</button>

    </div>

    <div class="qrow">

      <div class="qb" onclick="qb(500)">$500</div>

      <div class="qb" onclick="qb(1000)">$1K</div>

      <div class="qb" onclick="qb(2500)">$2.5K</div>

      <div class="qb" onclick="qb(5000)">$5K</div>

      <div class="qb" onclick="qb(10000)">$10K</div>

    </div>

    <button class="btn-join" id="joinBtn" onclick="joinRace()">🏃  JOIN RACE</button>

  </div>

</div>



<script>

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const AGENTS=[

  {id:'sas',name:'SAS Op.',emoji:'🟢',img:'/static/images/agents/5601.webp',color:'#4caf50',personality:'steady'},

  {id:'phoenix',name:'Phoenix',emoji:'🔴',img:'/static/images/agents/5205.webp',color:'#f44336',personality:'aggressive'},

  {id:'swat',name:'SWAT',emoji:'🔵',img:'/static/images/agents/4711.webp',color:'#2196f3',personality:'conservative'},

  {id:'guerrilla',name:'Guerrilla',emoji:'🟡',img:'/static/images/agents/4774.webp',color:'#ffd700',personality:'erratic'},

  {id:'ksk',name:'KSK Op.',emoji:'🟣',img:'/static/images/agents/5400.webp',color:'#9c27b0',personality:'tactical'},

  {id:'seal',name:'SEAL',emoji:'🩵',img:'/static/images/agents/4757.webp',color:'#00bcd4',personality:'steady'},

  {id:'ksm',name:'Sabre CT',emoji:'🟠',img:'/static/images/agents/4718.webp',color:'#ff9800',personality:'aggressive'},

  {id:'ground',name:'Rebel',emoji:'⚪',img:'/static/images/agents/5105.webp',color:'#9e9e9e',personality:'conservative'},

];

const PLACE_ICONS=['🥇','🥈','🥉','4️⃣'];
function laneAvatarHtml(agentData){
  if(!agentData.img) return `<div class="lane-emoji">${agentData.emoji||'🏃'}</div>`;
  return `<img class="lane-img" src="${agentData.img}" alt="" onerror="this.outerHTML='<div class=\'lane-emoji\'>${agentData.emoji||'🏃'}</div>'">`;
}



let balance=0,selectedAgent='sas',ws=null,roomCode=null,inRace=false,joining=false,raceWins=0,racesPlayed=0,quickJoinRoom=null;



function updateSessionStats(){

  const el=document.getElementById('sessionStats');

  if(!racesPlayed){el.innerHTML='';return;}

  el.innerHTML='RACES: <span style="color:var(--gold)">'+(raceWins)+' WIN</span> / '+(racesPlayed-raceWins)+' LOSS  ·  SESSION: '+racesPlayed+' PLAYED';

}

const canvas=document.getElementById('confetti');

const ctx=canvas.getContext('2d');

let pieces=[];



window.addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight;});

canvas.width=innerWidth;canvas.height=innerHeight;

(function tickConf(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces=pieces.filter(p=>p.life>.01);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.rot+=p.rs;p.life-=.006;ctx.save();ctx.globalAlpha=p.life;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});requestAnimationFrame(tickConf);})();



function shootConf(){const cols=['#ffd700','#ff9500','#22c55e','#3b82f6','#ff3333'];for(let i=0;i<100;i++){pieces.push({x:Math.random()*canvas.width,y:-10,vx:(Math.random()-.5)*6,vy:Math.random()*4+1,w:Math.random()*10+4,h:Math.random()*6+3,rot:Math.random()*360,rs:(Math.random()-.5)*8,c:cols[~~(Math.random()*cols.length)],life:1});}}



async function init(){

  try{const d=await api('/api/user/me');balance=d.balance;updateBal();}catch(e){}

  buildAgentGrid();

  const params=new URLSearchParams(location.search);
  quickJoinRoom=params.get('room');

}



function updateBal(){var e=document.getElementById('balDisplay'),c=e.textContent||'',n='$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});if(c&&c!=='$—'&&c!==n){var p=parseFloat(c.replace(/[,$]/g,''));if(!isNaN(p)&&p!==balance){animateBalance(e,'$'+p.toLocaleString(undefined,{maximumFractionDigits:0}),n,balance>=p);return}}e.textContent=n}



function buildAgentGrid(){

  const grid=document.getElementById('agentGrid');grid.innerHTML='';

  AGENTS.forEach(a=>{

    const card=document.createElement('div');card.className='agent-card'+(a.id===selectedAgent?' selected':'');

    card.style.borderColor=a.id===selectedAgent?a.color:'';

    card.innerHTML=`<img class="agent-img" src="${a.img}" alt="${a.name}" onerror="this.outerHTML='<span class=\'agent-emoji\'>${a.emoji}</span>'"><div class="agent-name" style="color:${a.id===selectedAgent?a.color:'#668'}">${a.name}</div><div class="agent-trait">${a.personality}</div>`;

    card.onclick=()=>selectAgent(a.id);

    grid.appendChild(card);

  });

}



function selectAgent(id){Sound.click();selectedAgent=id;buildAgentGrid();}

function qb(v){Sound.click();document.getElementById('betInp').value=v;}

function halveBet(){Sound.click();document.getElementById('betInp').value=Math.max(100,Math.floor(parseInt(document.getElementById('betInp').value||1000)/2));}

function doubleBet(){Sound.click();document.getElementById('betInp').value=Math.min(balance,parseInt(document.getElementById('betInp').value||1000)*2);}



async function joinRace(){


  Sound.click();


  if(joining||inRace) return;

  const bet=parseInt(document.getElementById('betInp').value)||1000;

  if(bet>balance){setPhase('idle','❌ INSUFFICIENT BALANCE');Sound.error();return;}

  joining=true;document.getElementById('joinBtn').disabled=true;

  try{

    const body={amount:bet,agent_id:selectedAgent};

    if(quickJoinRoom){body.room_code=quickJoinRoom;quickJoinRoom=null;}

    const d=await api('/api/games/race/join',{method:'POST',body:JSON.stringify(body)});

    roomCode=d.room_code;balance=await refreshBal();updateBal();

    setPhase('lobby','⏳ IN LOBBY — RACE STARTS SOON');

    show('lobbySection');hide('agentSection');

    connectWS(roomCode);

  }catch(e){

    joining=false;document.getElementById('joinBtn').disabled=false;

    setPhase('idle','ERROR: '+e.message);

  }

}



function connectWS(code){

  const proto=location.protocol==='https:'?'wss:':'ws:';

  ws=new WebSocket(proto+'//'+location.host+'/api/games/race/ws/'+code);

  ws.onmessage=(ev)=>handleMsg(JSON.parse(ev.data));

  ws.onclose=()=>{if(inRace)setTimeout(()=>connectWS(code),2000);};

}



function handleMsg(msg){

  switch(msg.type){

    case 'lobby_tick':

      document.getElementById('lobbyTimer').textContent=msg.seconds;

      renderLobbyPlayers(msg.players);

      break;

    case 'countdown':


      Sound.beep();


      setPhase('countdown',msg.number===0?'GO! 🏃':'STARTING IN '+msg.number+'…');


      break;

    case 'go':


      Sound.whoosh();


      inRace=true;joining=false;


      setPhase('racing','🏃  RACE IS LIVE!');


      hide('lobbySection');show('trackWrap');show('reactionRow');


      renderTrack(msg.racers);


      break;

    case 'race_tick':

      renderTrack(msg.racers);

      break;

    case 'racer_finished':

      onRacerFinished(msg);

      break;

    case 'reaction':

      showFloatReaction(msg.emoji);

      break;

    case 'race_results':

      onRaceResults(msg);

      break;

  }

}



function renderLobbyPlayers(players){

  if(!players) return;

  const lanes=document.getElementById('racerLanes');

  lanes.innerHTML='';

  show('trackWrap');

  players.forEach(p=>{

    const agentData=AGENTS.find(a=>a.id===p.agent_id)||{emoji:'🏃',color:'#888',name:p.username};

    const lane=document.createElement('div');lane.className='racer-lane'+(p.agent_id===selectedAgent?' my-lane':'');

    lane.innerHTML=`${laneAvatarHtml(agentData)}

      <div class="lane-name" style="color:${agentData.color}">${esc(p.username)}</div>

      <div class="lane-track"><div class="lane-fill" style="width:0%;background:${agentData.color}40"></div></div>

      <div class="lane-pct">READY</div>`;

    lanes.appendChild(lane);

  });

}



function renderTrack(racers){

  const lanes=document.getElementById('racerLanes');

  // Build sorted order for place display

  const sorted=[...racers].sort((a,b)=>b.progress-a.progress);

  lanes.innerHTML='';

  racers.forEach(p=>{

    const agentData=AGENTS.find(a=>a.id===p.agent_id)||{emoji:'🏃',color:'#888'};

    const place=sorted.findIndex(s=>s.user_id===p.user_id)+1;

    const lane=document.createElement('div');

    lane.className='racer-lane'+(p.agent_id===selectedAgent?' my-lane':'')+(p.finished?' winner-lane':'');

    const fill=Math.min(100,p.progress||0);

    lane.innerHTML=`${laneAvatarHtml(agentData)}

      <div class="lane-name" style="color:${agentData.color}">${esc(p.username.replace('🤖 ',''))}</div>

      <div class="lane-track"><div class="lane-fill${p.bursting?' bursting':''}" style="width:${fill}%;background:${agentData.color}"></div></div>

      <div class="lane-pct">${fill.toFixed(0)}%</div>

      <div class="lane-place place-${place}">${PLACE_ICONS[place-1]||''}</div>`;

    lanes.appendChild(lane);

  });

}



function onRacerFinished(msg){


  if(msg.place===1&&msg.agent_id===selectedAgent){


    Sound.win();


    shootConf();


  }


}



function onRaceResults(msg){

  inRace=false;

  setPhase('finished','🏁  RACE COMPLETE!');

  hide('reactionRow');

  show('resultsSection');

  const grid=document.getElementById('resultsGrid');grid.innerHTML='';

  const results=msg.results||[];

  results.sort((a,b)=>a.place-b.place).forEach(r=>{

    const isMe=r.agent_id===selectedAgent;

    const card=document.createElement('div');card.className='result-card'+(r.place===1?' top':'');

    card.innerHTML=`<div class="rc-place">${PLACE_ICONS[r.place-1]||r.place}</div>

      <div class="rc-info">

        <div class="rc-name">${esc(r.username)}</div>

        <div class="rc-time">Finished in ${r.finish_time}s · ${r.agent_name}</div>

      </div>

      <div class="rc-payout">${r.payout>0?'+$'+r.payout.toLocaleString(undefined,{maximumFractionDigits:0}):''}</div>`;

    grid.appendChild(card);

  });

  // Track session stats

  const myResult=results.find(r=>r.agent_id===selectedAgent);


  racesPlayed++;


  if(myResult&&myResult.place===1){Sound.win();raceWins++;if(window.maybeBigWin&&myResult.payout>0){const lrb=parseInt(document.getElementById('betInp').value)||1000;maybeBigWin(lrb,myResult.payout);}}else{Sound.loss();}

  updateSessionStats();

  refreshBalSoon();

  document.getElementById('raceAgainBtn').style.display='';

  setTimeout(()=>{

    raceAgain();

  },12000);

}



function raceAgain(){Sound.click();

  document.getElementById('raceAgainBtn').style.display='none';

  hide('resultsSection');hide('trackWrap');hide('lobbySection');

  show('agentSection');

  setPhase('idle','SELECT AN AGENT AND JOIN A NEW RACE');

  document.getElementById('joinBtn').disabled=false;

  joining=false;

}



function sendReaction(emoji){

  if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'reaction',emoji}));

  showFloatReaction(emoji);

}

function showFloatReaction(emoji){

  const el=document.createElement('div');el.className='rxn-float';el.textContent=emoji;

  el.style.left=(20+Math.random()*60)+'%';el.style.bottom='160px';

  document.body.appendChild(el);setTimeout(()=>el.remove(),1900);

}



function setPhase(state,text){const el=document.getElementById('phaseBanner');el.className='phase-banner '+state;el.textContent=text;}

function inviteToRace(){
  if(!roomCode) return;
  const url=`${location.origin}/games/live-race.html?room=${roomCode}`;
  const flash=()=>{setPhase('lobby','🔗 INVITE LINK COPIED!');setTimeout(()=>setPhase('lobby','⏳ IN LOBBY — RACE STARTS SOON'),1500);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(flash,()=>prompt('Copy this invite link:',url));
  } else {
    prompt('Copy this invite link:',url);
  }
}

function show(id){document.getElementById(id).style.display='';}

function hide(id){document.getElementById(id).style.display='none';}

async function refreshBal(){try{const d=await api('/api/user/me');return d.balance;}catch(e){return balance;}}

function refreshBalSoon(){setTimeout(async()=>{balance=await refreshBal();updateBal();},2000);return balance;}

async function api(url,opts={}){const r=await fetch(url,{credentials:'include',headers:{'Content-Type':'application/json'},...opts});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'Error');}return r.json();}

init();

</script>

<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/static/sw.js").catch(function(){})}</script>


<script src="/static/chat.js"></script>
