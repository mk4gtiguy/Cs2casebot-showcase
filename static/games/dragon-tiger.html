<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>🐉  Dragon Tiger — CS2CaseBot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{--bg:#060610;--dragon:#ff3333;--tiger:#ff9900;--tie:#22c55e;--gold:#ffd700;--font:'Orbitron',monospace;}

html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#e8eaf0;}



.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;

  background:rgba(6,6,16,0.97);border-bottom:1px solid rgba(255,51,51,0.15);

  position:sticky;top:0;z-index:50;}

.back{display:flex;align-items:center;gap:5px;color:#444;font-size:10px;

  letter-spacing:1px;text-decoration:none;transition:color .2s;}

.back:hover{color:var(--dragon);}

.back svg{width:14px;height:14px;}

.title{flex:1;font-size:14px;font-weight:900;letter-spacing:3px;color:var(--dragon);}

.bal{font-size:13px;font-weight:700;color:var(--gold);font-family:monospace;}



.page{max-width:420px;margin:0 auto;padding:20px 16px 80px;}



/* ARENA */

.arena{background:rgba(10,10,24,0.95);border:1px solid rgba(255,255,255,0.06);

  border-radius:24px;padding:24px 20px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden;}

.arena::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;

  background:linear-gradient(90deg,var(--dragon),transparent,var(--tiger));}



.vs-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:20px;}

.side-label{font-size:9px;letter-spacing:2px;color:#555;margin-bottom:8px;}

.card-display{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);

  border-radius:14px;padding:20px 12px;min-height:90px;

  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}

.card-display.dragon-side{border-color:rgba(255,51,51,0.2);}

.card-display.tiger-side{border-color:rgba(255,153,0,0.2);}

.card-display.winner{box-shadow:0 0 20px rgba(255,215,0,0.3);border-color:rgba(255,215,0,0.4);}

.card-value{font-size:32px;font-weight:900;font-family:monospace;line-height:1;}

.card-suit{font-size:18px;line-height:1;}

.card-hearts,.card-diamonds{color:#ff4444;}

.card-spades,.card-clubs{color:#e8eaf0;}

.card-idle{font-size:28px;color:#222;}

.vs-badge{font-size:16px;font-weight:900;color:#333;letter-spacing:2px;}



.result-banner{min-height:44px;display:flex;align-items:center;justify-content:center;

  font-size:13px;font-weight:900;letter-spacing:2px;}

.result-banner.win{color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.5);}

.result-banner.loss{color:#ff4444;text-shadow:0 0 20px rgba(255,68,68,0.4);}

.result-banner.push{color:var(--tie);text-shadow:0 0 20px rgba(34,197,94,0.4);}

.result-banner.idle{color:#333;font-size:11px;}



/* BET SELECTOR */

.pick-section{margin-bottom:16px;}

.pick-label{font-size:9px;letter-spacing:2px;color:#444;margin-bottom:10px;}

.pick-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

.pick-btn{padding:16px 8px;border-radius:14px;border:2px solid rgba(255,255,255,0.07);

  background:rgba(255,255,255,0.03);cursor:pointer;text-align:center;transition:all .2s;}

.pick-btn .pe{font-size:24px;display:block;margin-bottom:4px;}

.pick-btn .pn{font-size:10px;font-weight:700;letter-spacing:1px;}

.pick-btn .po{font-size:8px;color:#444;margin-top:2px;}



.pick-btn.dragon-btn{border-color:rgba(255,51,51,0.2);}

.pick-btn.tiger-btn{border-color:rgba(255,153,0,0.2);}

.pick-btn.tie-btn{border-color:rgba(34,197,94,0.15);}

.pick-btn.selected.dragon-btn{border-color:var(--dragon);background:rgba(255,51,51,0.08);box-shadow:0 0 20px rgba(255,51,51,0.2);}

.pick-btn.selected.tiger-btn{border-color:var(--tiger);background:rgba(255,153,0,0.08);box-shadow:0 0 20px rgba(255,153,0,0.2);}

.pick-btn.selected.tie-btn{border-color:var(--tie);background:rgba(34,197,94,0.08);box-shadow:0 0 20px rgba(34,197,94,0.15);}

.pick-btn.selected.dragon-btn .pn{color:var(--dragon);}

.pick-btn.selected.tiger-btn .pn{color:var(--tiger);}

.pick-btn.selected.tie-btn .pn{color:var(--tie);}



/* BET */

.bet-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}

.bet-inp{flex:1;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);

  border-radius:8px;padding:12px 14px;color:#e8eaf0;font-family:var(--font);

  font-size:13px;font-weight:700;outline:none;text-align:center;}

.bet-inp:focus{border-color:rgba(255,51,51,0.3);}

.adj{padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);

  border-radius:8px;color:#666;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;}

.adj:hover{border-color:rgba(255,51,51,0.3);color:var(--dragon);}



.quick-row{display:flex;gap:6px;margin-bottom:14px;}

.qb{flex:1;padding:8px 4px;background:rgba(255,51,51,0.06);border:1px solid rgba(255,51,51,0.12);

  border-radius:8px;color:#888;font-family:var(--font);font-size:9px;letter-spacing:1px;

  cursor:pointer;text-align:center;transition:all .15s;}

.qb:hover{border-color:var(--dragon);color:var(--dragon);}



.btn-deal{width:100%;padding:18px;border:none;border-radius:14px;

  font-family:var(--font);font-size:14px;font-weight:900;letter-spacing:3px;

  cursor:pointer;transition:all .2s;}

.btn-deal.dragon-mode{background:linear-gradient(135deg,#a00,var(--dragon));color:#fff;box-shadow:0 4px 24px rgba(255,51,51,0.35);}

.btn-deal.tiger-mode{background:linear-gradient(135deg,#b06000,var(--tiger));color:#fff;box-shadow:0 4px 24px rgba(255,153,0,0.35);}

.btn-deal.tie-mode{background:linear-gradient(135deg,#0a5020,var(--tie));color:#fff;box-shadow:0 4px 24px rgba(34,197,94,0.3);}

.btn-deal.idle-mode{background:rgba(255,255,255,0.06);color:#444;box-shadow:none;}

.btn-deal:disabled{opacity:.4;cursor:not-allowed;}

.btn-deal:not(:disabled):hover{transform:translateY(-2px);}



/* STATS */

.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;}

.st{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);

  border-radius:10px;padding:8px;text-align:center;}

.st .v{font-size:13px;font-weight:700;color:var(--gold);font-family:monospace;}

.st .l{font-size:8px;color:#444;letter-spacing:1px;margin-top:2px;}



/* FLASH */

#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:200;}

#flash.gold{background:radial-gradient(ellipse at 50% 50%,rgba(255,215,0,0.3),transparent 70%);}

#flash.red{background:radial-gradient(ellipse at 50% 50%,rgba(255,68,68,0.25),transparent 70%);}

#flash.show{animation:fl .5s ease;}

@keyframes fl{0%,100%{opacity:0;}30%{opacity:1;}}

</style>

    <script src="/static/sound.js"></script>

    <script src="/static/big-win.js"></script>


    <script src="/static/balance-animation.js"></script>


    <script src="/static/page-transitions.js"></script>


    <script src="/static/autoplay.js"></script>


<link rel="stylesheet" href="/static/games-shared.css"><script src="/static/js/csrf.js"></script>


</head>

<body>

<div id="flash"></div>

<header class="hdr">

  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>

  <span class="title">🐉  DRAGON TIGER</span>

  <span class="bal" id="balDisplay">$—</span>

</header>



<div class="page">

  <!-- ARENA -->

  <div class="arena">

    <div class="vs-row">

      <div>

        <div class="side-label">🐉 DRAGON</div>

        <div class="card-display dragon-side" id="dragonCard">

          <div class="card-idle">🂠</div>

        </div>

      </div>

      <div class="vs-badge">VS</div>

      <div>

        <div class="side-label">🐯 TIGER</div>

        <div class="card-display tiger-side" id="tigerCard">

          <div class="card-idle">🂠</div>

        </div>

      </div>

    </div>

    <div class="result-banner idle" id="resultBanner">PICK A SIDE TO PLAY</div>

    <div id="streakBadge" style="display:none;text-align:center;margin-top:6px;font-size:9px;letter-spacing:2px;padding:4px 0;"></div>

  </div>



  <!-- PICK -->

  <div class="pick-section">

    <div class="pick-label">YOUR BET</div>

    <div class="pick-btns">

      <div class="pick-btn dragon-btn" id="btnDragon" onclick="setPick('dragon')">

        <span class="pe">🐉</span>

        <div class="pn">DRAGON</div>

        <div class="po">2× PAYOUT</div>

      </div>

      <div class="pick-btn tie-btn" id="btnTie" onclick="setPick('tie')">

        <span class="pe">⚖️</span>

        <div class="pn">TIE</div>

        <div class="po">8× PAYOUT</div>

      </div>

      <div class="pick-btn tiger-btn" id="btnTiger" onclick="setPick('tiger')">

        <span class="pe">🐯</span>

        <div class="pn">TIGER</div>

        <div class="po">2× PAYOUT</div>

      </div>

    </div>

  </div>



  <!-- BET -->

  <div class="bet-row">

    <button class="adj" onclick="halveBet()">½</button>

    <input class="bet-inp" id="betInp" type="number" value="500" min="100" step="100">

    <button class="adj" onclick="doubleBet()">2×</button>

  </div>

  <div class="quick-row">

    <div class="qb" onclick="qBet(100)">$100</div>

    <div class="qb" onclick="qBet(500)">$500</div>

    <div class="qb" onclick="qBet(1000)">$1K</div>

    <div class="qb" onclick="qBet(5000)">$5K</div>

    <div class="qb" onclick="qBet(10000)">$10K</div>

  </div>



  <button class="btn-deal idle-mode" id="dealBtn" onclick="deal()" disabled>SELECT A SIDE</button>



  <div style="display:flex;gap:6px;margin-top:10px;align-items:center;">

    <span style="font-size:8px;color:#444;letter-spacing:1px;white-space:nowrap;flex-shrink:0;">AUTO</span>

    <div class="qb" id="ac5" onclick="setAutoCount(5)" style="flex:1;">5×</div>

    <div class="qb" id="ac10" onclick="setAutoCount(10)" style="flex:1;">10×</div>

    <div class="qb" id="ac25" onclick="setAutoCount(25)" style="flex:1;">25×</div>

    <button id="autoBtn" onclick="toggleAuto()" style="flex:2;padding:8px 4px;background:rgba(255,51,51,0.06);border:1px solid rgba(255,51,51,0.15);border-radius:8px;color:#888;font-family:var(--font);font-size:8px;font-weight:700;letter-spacing:1px;cursor:pointer;">🔁 AUTO PLAY</button>

  </div>



  <div class="stats-bar">

    <div class="st"><div class="v" id="stW">0</div><div class="l">WINS</div></div>

    <div class="st"><div class="v" id="stL">0</div><div class="l">LOSSES</div></div>

    <div class="st"><div class="v" id="stP">$0</div><div class="l">PROFIT</div></div>

  </div>

  <div class="stats-bar" style="margin-top:8px;">

    <div class="st"><div class="v" id="stDR">—</div><div class="l">DRAGON%</div></div>

    <div class="st"><div class="v" id="stTR">—</div><div class="l">TIGER%</div></div>

    <div class="st"><div class="v" id="stSK">—</div><div class="l">STREAK</div></div>

  </div>

</div>



<script>

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let pick=null,balance=0,wins=0,losses=0,profit=0,dealing=false;

let dragonWins=0,tigerWins=0,tieCount=0,streakSide=null,streakCount=0,totalRounds=0;

let autoTarget=0,autoRunning=false;



async function init(){

  try{const d=await api('/api/user/me');balance=d.balance;updateBal();}catch(e){}

}

function updateBal(){


  var e=document.getElementById('balDisplay'),c=e.textContent||'',n='$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});


  if(c&&c!=='$—'&&c!==n){var p=parseFloat(c.replace(/[,$]/g,''));if(!isNaN(p)&&p!==balance){animateBalance(e,'$'+p.toLocaleString(undefined,{maximumFractionDigits:0}),n,balance>=p);return}}


  e.textContent=n


}



function setPick(p){


  Sound.click();Sound.chip();


  pick=p;


  ['btnDragon','btnTie','btnTiger'].forEach(id=>document.getElementById(id).classList.remove('selected'));


  document.getElementById(p==='dragon'?'btnDragon':p==='tiger'?'btnTiger':'btnTie').classList.add('selected');


  const btn=document.getElementById('dealBtn');


  btn.disabled=false;


  btn.className='btn-deal '+(p==='dragon'?'dragon-mode':p==='tiger'?'tiger-mode':'tie-mode');


  btn.textContent='🎴 DEAL — BET '+(p==='dragon'?'DRAGON':p==='tiger'?'TIGER':'TIE');


  document.getElementById('resultBanner').className='result-banner idle';


  document.getElementById('resultBanner').textContent='BET PLACED — DEAL WHEN READY';


  resetCards();


}



function qBet(v){Sound.click();document.getElementById('betInp').value=v;}


function halveBet(){Sound.click();document.getElementById('betInp').value=Math.max(100,Math.floor(parseInt(document.getElementById('betInp').value||500)/2));}


function doubleBet(){Sound.click();document.getElementById('betInp').value=Math.min(balance,parseInt(document.getElementById('betInp').value||500)*2);}



function resetCards(){

  document.getElementById('dragonCard').innerHTML='<div class="card-idle">🂠</div>';

  document.getElementById('tigerCard').innerHTML='<div class="card-idle">🂠</div>';

  document.getElementById('dragonCard').className='card-display dragon-side';

  document.getElementById('tigerCard').className='card-display tiger-side';

}



function renderCard(el, card, isWinner){

  const suitClass = (card.suit==='♥'||card.suit==='♦') ? 'card-hearts' : 'card-spades';

  el.innerHTML=`<div class="card-value ${suitClass}">${esc(card.name)}</div><div class="card-suit ${suitClass}">${esc(card.suit)}</div>`;

  if(isWinner) el.classList.add('winner');

}



async function deal(){


  if(!pick||dealing) return;


  Sound.click();


  const bet=parseInt(document.getElementById('betInp').value)||500;

  if(bet>balance){setResult('INSUFFICIENT BALANCE','idle');return;}

  dealing=true;

  document.getElementById('dealBtn').disabled=true;

  resetCards();

  setResult('DEALING...','idle');



  try{

    const d=await api('/api/games/easy/dragon-tiger',{method:'POST',

      body:JSON.stringify({amount:bet,bet_on:pick})});



    await delay(600);

    const dragonWon = d.outcome==='dragon';

    const tigerWon  = d.outcome==='tiger';

    const tieOut    = d.outcome==='tie';

    Sound.card();renderCard(document.getElementById('dragonCard'), d.dragon, dragonWon||(tieOut&&pick==='tie'));


    await delay(300);


    Sound.card();renderCard(document.getElementById('tigerCard'),  d.tiger,  tigerWon||(tieOut&&pick==='tie'));



    await delay(400);

    balance=await refreshBal();

    updateBal();



    let profitDelta, resultText, resultCls;

    if(d.tie_push){


      profitDelta=-bet/2;


      resultText=`⚖️ TIE — HALF BET RETURNED ($${d.win.toLocaleString(undefined,{maximumFractionDigits:0})})`;


      resultCls='push';


    } else if(d.user_wins){


      Sound.win();profitDelta=d.win-bet;


      resultText=`✅ ${d.outcome.toUpperCase()} WINS — +$${d.win.toLocaleString(undefined,{maximumFractionDigits:0})}`;if(window.maybeBigWin)maybeBigWin(bet,d.win);


      resultCls='win';


      flashScreen('gold');


    } else {


      Sound.loss();profitDelta=-bet;


      resultText=`❌ ${d.outcome.toUpperCase()} WINS — LOST $${bet.toLocaleString(undefined,{maximumFractionDigits:0})}`;


      resultCls='loss';


      flashScreen('red');


    }



    if(d.user_wins) wins++; else losses++;

    profit+=profitDelta;

    setResult(resultText, resultCls);

    updateDTStats(d.outcome);

  }catch(e){

    setResult('ERROR: '+e.message,'idle');

  }finally{

    dealing=false;

    document.getElementById('dealBtn').disabled=false;

  }

}



function setResult(text,cls){

  const el=document.getElementById('resultBanner');

  el.className='result-banner '+cls;

  el.textContent=text;

}

function flashScreen(type){

  const el=document.getElementById('flash');

  el.className='';el.className=type;

  void el.offsetWidth;el.classList.add('show');

}

async function refreshBal(){

  try{const d=await api('/api/user/me');return d.balance;}catch(e){return balance;}

}

async function api(url,opts={}){

  const r=await fetch(url,{credentials:'include',headers:{'Content-Type':'application/json'},...opts});

  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'Error');}

  return r.json();

}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

function updateDTStats(outcome){

  totalRounds++;

  if(outcome==='dragon') dragonWins++;

  else if(outcome==='tiger') tigerWins++;

  else tieCount++;

  // Streak

  if(outcome===streakSide) streakCount++;

  else{streakSide=outcome;streakCount=1;}

  document.getElementById('stW').textContent=wins;

  document.getElementById('stL').textContent=losses;

  document.getElementById('stP').textContent=(profit>=0?'+':'')+profit.toLocaleString(undefined,{maximumFractionDigits:0});

  const nonTie=totalRounds-tieCount||1;

  document.getElementById('stDR').textContent=Math.round(dragonWins/nonTie*100)+'%';

  document.getElementById('stTR').textContent=Math.round(tigerWins/nonTie*100)+'%';

  const sk=document.getElementById('stSK');

  const sideLabel=streakSide==='dragon'?'🐉':streakSide==='tiger'?'🐯':'⚖️';

  sk.textContent=streakCount>1?sideLabel+' '+streakCount+'×':'—';

  // Streak badge in arena

  const badge=document.getElementById('streakBadge');

  if(streakCount>=3){

    const sc=streakSide==='dragon'?'var(--dragon)':streakSide==='tiger'?'var(--tiger)':'var(--tie)';

    badge.style.display='block';badge.style.color=sc;

    badge.textContent=sideLabel+' ON A '+streakCount+'-WIN STREAK';

  }else{badge.style.display='none';}

}

function setAutoCount(n){


  Sound.click();autoTarget=n;

  ['ac5','ac10','ac25'].forEach(id=>{

    const el=document.getElementById(id);

    el.style.borderColor=parseInt(el.textContent)===n?'var(--dragon)':'rgba(255,51,51,0.12)';

    el.style.color=parseInt(el.textContent)===n?'var(--dragon)':'#888';

  });

}

async function toggleAuto(){


  Sound.click();if(autoRunning){autoRunning=false;return;}


  if(!pick||!autoTarget){setResult('SELECT A SIDE AND AUTO COUNT','idle');return;}

  autoRunning=true;

  const btn=document.getElementById('autoBtn');

  let rem=autoTarget;

  while(rem>0&&autoRunning){

    const bet=parseInt(document.getElementById('betInp').value)||500;

    if(bet>balance){autoRunning=false;break;}

    btn.textContent='⏹️ STOP ('+rem+' left)';btn.style.color='var(--dragon)';

    await deal();

    rem--;

    if(rem>0&&autoRunning) await delay(400);

  }

  autoRunning=false;

  btn.textContent='🔁 AUTO PLAY';btn.style.color='#888';

}

init();

</script>

<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/static/sw.js").catch(function(){})}</script>


<script src="/static/chat.js"></script>


</body>

</html>
