<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🃏  Case Draft Duel — CS2CaseBot</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#06070a;--accent:#ffd700;--green:#22c55e;--red:#ef4444;--muted:#556;--font:'Orbitron',monospace;}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#c8d0e8;}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(6,7,10,0.98);border-bottom:1px solid rgba(255,215,0,0.12);position:sticky;top:0;z-index:50;}
.back{display:flex;align-items:center;gap:5px;color:#2a2a3a;font-size:10px;letter-spacing:1px;text-decoration:none;transition:color .2s;}
.back:hover{color:var(--accent);}
.back svg{width:14px;height:14px;}
.title{flex:1;font-size:12px;font-weight:900;letter-spacing:1px;color:var(--accent);}
.bal{font-size:13px;font-weight:700;color:var(--accent);font-family:monospace;}
.page{max-width:460px;margin:0 auto;padding:16px 14px 80px;}

.section-label{font-size:9px;letter-spacing:2px;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;}
.duel-list{display:flex;flex-direction:column;gap:8px;}
.duel-card{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.1);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;}
.duel-card:hover{border-color:rgba(255,215,0,0.35);background:rgba(255,215,0,0.03);}
.duel-card .dc-icon{font-size:22px;}
.duel-card .dc-info{flex:1;}
.duel-card .dc-value{font-size:15px;font-weight:900;color:var(--accent);font-family:monospace;}
.duel-card .dc-meta{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.5px;}
.empty-lobby{text-align:center;padding:30px 10px;color:var(--muted);font-size:11px;}

.stake-panel{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.1);border-radius:14px;padding:16px;margin-top:14px;}
.stake-input{width:100%;padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--accent);font-family:monospace;font-size:20px;font-weight:900;text-align:center;margin-bottom:10px;}
.stake-quick{display:flex;gap:6px;margin-bottom:14px;}
.stake-quick button{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#ccc;font-family:var(--font);font-size:10px;cursor:pointer;}
.stake-quick button:hover{border-color:var(--accent);color:var(--accent);}
.btn-new-duel{width:100%;padding:15px;border:none;border-radius:12px;font-family:var(--font);font-size:12px;font-weight:900;letter-spacing:2px;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#7a5c00,var(--accent));color:#06070a;box-shadow:0 4px 20px rgba(255,215,0,0.3);}
.btn-new-duel:hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(255,215,0,0.5);}

.vs-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.vs-side{flex:1;border:2px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px;text-align:center;background:rgba(255,255,255,0.02);}
.vs-side.me{border-color:rgba(255,215,0,0.35);}
.vs-side.turn{border-color:var(--accent);box-shadow:0 0 12px rgba(255,215,0,0.25);}
.vs-side.winner{border-color:var(--green);background:rgba(34,197,94,0.08);}
.vs-side .vs-user{font-size:10px;color:var(--muted);}
.vs-side .vs-total{font-size:16px;color:var(--accent);font-weight:900;font-family:monospace;margin-top:4px;}
.vs-mid2{font-size:16px;font-weight:900;color:var(--muted);}

.turn-banner{text-align:center;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:12px;color:var(--muted);}
.turn-banner.mine{color:var(--accent);animation:pulse-cd .8s infinite;}
@keyframes pulse-cd{0%,100%{opacity:1;}50%{opacity:.5;}}

.pool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.pool-case{border:2px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px 6px;text-align:center;background:rgba(255,255,255,0.02);cursor:pointer;transition:all .15s;}
.pool-case.pickable{border-color:rgba(255,215,0,0.3);}
.pool-case.pickable:hover{border-color:var(--accent);background:rgba(255,215,0,0.06);}
.pool-case.picked{opacity:.3;cursor:default;}
.pool-case img{width:48px;height:48px;object-fit:contain;margin:0 auto 4px;}
.pool-case .pc-name{font-size:8px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pool-case .pc-picked-by{font-size:7px;color:var(--muted);margin-top:2px;}

.picks-feed{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.pick-row{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.3);border-radius:8px;padding:6px 10px;font-size:10px;}
.pick-row img{width:28px;height:28px;object-fit:contain;}
.pick-row .pr-user{color:var(--muted);width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pick-row .pr-item{flex:1;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pick-row .pr-value{color:var(--accent);font-weight:700;}

.duel-actions{display:flex;gap:8px;margin-top:6px;}
.btn-join-duel,.btn-backout,.btn-lobby{flex:1;padding:14px;border-radius:10px;font-family:var(--font);font-size:11px;font-weight:900;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.btn-join-duel{border:none;background:linear-gradient(135deg,#7a5c00,var(--accent));color:#06070a;}
.btn-backout{border:1px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.08);color:var(--red);}
.btn-lobby{border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.03);color:#ccc;}

.disclaimer-inline{font-size:10px;color:var(--muted);margin-top:18px;text-align:center;line-height:1.5;}
</style>
    <script src="/static/sound.js"></script>
    <script src="/static/big-win.js"></script>
    <script src="/static/balance-animation.js"></script>
    <script src="/static/page-transitions.js"></script>
<link rel="stylesheet" href="/static/games-shared.css"><script src="/static/js/csrf.js"></script>
</head>
<body>

<header class="hdr">
  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>
  <span class="title">🃏  CASE DRAFT DUEL</span>
  <span class="bal" id="balDisplay">$—</span>
</header>

<div class="page">

  <div id="lobbyView">
    <div class="section-label">Open Duels</div>
    <div class="duel-list" id="duelList"></div>

    <div class="stake-panel">
      <input type="number" class="stake-input" id="stakeInput" value="50" min="10" max="750000" step="1">
      <div class="stake-quick">
        <button onclick="setStake(10)">$10</button>
        <button onclick="setStake(50)">$50</button>
        <button onclick="setStake(100)">$100</button>
        <button onclick="setStake(500)">$500</button>
      </div>
      <button class="btn-new-duel" onclick="startDuel(null)">🃏  PAY ENTRY — START A DUEL</button>
    </div>
    <div class="disclaimer-inline">⚠️ Pay an entry fee, then alternate drafting 3 cases each from a shared pool of 6. Every opened item goes straight into your own inventory — the higher total wins the combined entry fee pool (5% rake, same as Case Battles).</div>
  </div>

  <div id="duelView" style="display:none;">
    <div class="vs-header" id="vsHeader"></div>
    <div class="turn-banner" id="turnBanner"></div>
    <div class="pool-grid" id="poolGrid"></div>
    <div class="section-label" id="feedLabel" style="display:none;">Picks So Far</div>
    <div class="picks-feed" id="picksFeed"></div>
    <div class="duel-actions" id="duelActions"></div>
    <div style="text-align:center;margin-top:10px;">
      <button class="btn-lobby" style="max-width:200px;margin:0 auto;display:block;" onclick="showLobby()">← BACK TO LOBBY</button>
    </div>
  </div>

</div>

<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let balance = 0, myUserId = null;
let balDisplayInited = false;
let currentDuelId = null;
let ws = null;
let lobbyTimer = null;
let lastDuel = null;
let caseMeta = {};   // case_id -> {name, emoji}

async function init(){
  try{ const d = await api('/api/user/me'); balance = d.balance; myUserId = String(d.user_id); updateBal(); }catch(e){}
  try{
    const c = await api('/api/cases');
    (c.cases || []).forEach(cs => { caseMeta[cs.id] = cs; });
  }catch(e){}
  const params = new URLSearchParams(location.search);
  const duelParam = params.get('duel');
  if (duelParam){
    try{
      const data = await api('/api/games/case-draft-duel/duels/' + duelParam);
      enterDuel(Number(duelParam), data);
      return;
    }catch(e){ showToast('Could not load that duel'); }
  }
  showLobby();
}

function updateBal(){
  const e = document.getElementById('balDisplay');
  const n = '$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});
  if (balDisplayInited && window.animateBalance) { animateBalance(e, e.textContent, n, true); }
  else { e.textContent = n; }
  balDisplayInited = true;
}
async function refreshBal(){ try{ const d = await api('/api/user/me'); return d.balance; }catch(e){ return balance; } }

function setStake(v){ document.getElementById('stakeInput').value = v; }

function showLobby(){
  closeWS();
  currentDuelId = null;
  document.getElementById('duelView').style.display = 'none';
  document.getElementById('lobbyView').style.display = 'block';
  loadLobby();
  if (lobbyTimer) clearInterval(lobbyTimer);
  lobbyTimer = setInterval(loadLobby, 4000);
}

async function loadLobby(){
  try{
    const data = await api('/api/games/case-draft-duel/duels');
    const list = document.getElementById('duelList');
    if (!data.duels.length){
      list.innerHTML = '<div class="empty-lobby">No open duels right now — start one!</div>';
      return;
    }
    list.innerHTML = data.duels.map(d => `
      <div class="duel-card" onclick="startDuel(${d.duel_id})">
        <div class="dc-icon">🃏</div>
        <div class="dc-info">
          <div class="dc-value">$${Number(d.entry_fee).toFixed(2)} entry</div>
          <div class="dc-meta">${d.player_count}/2 PLAYERS — WAITING</div>
        </div>
      </div>
    `).join('');
  }catch(e){}
}

async function startDuel(duelId){
  let fee = duelId ? null : parseFloat(document.getElementById('stakeInput').value);
  if (!duelId && (!fee || fee < 10)){
    showToast('Minimum entry fee is $10');
    return;
  }
  try{
    const body = duelId ? { duel_id: duelId, entry_fee: 0 } : { entry_fee: fee };
    if (duelId){
      const existing = await api('/api/games/case-draft-duel/duels/' + duelId);
      body.entry_fee = Number(existing.entry_fee);
    }
    const data = await api('/api/games/case-draft-duel/join', { method: 'POST', body: JSON.stringify(body) });
    balance = await refreshBal(); updateBal();
    enterDuel(data.duel_id, data.duel);
  }catch(e){
    showToast(e.message || 'Could not join duel');
  }
}

function enterDuel(duelId, duel){
  if (lobbyTimer) { clearInterval(lobbyTimer); lobbyTimer = null; }
  currentDuelId = duelId;
  document.getElementById('lobbyView').style.display = 'none';
  document.getElementById('duelView').style.display = 'block';
  renderDuel(duel);
  connectWS(duelId);
}

function connectWS(duelId){
  closeWS();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/api/games/case-draft-duel/ws/' + duelId);
  ws.onmessage = (ev) => handleWSMsg(JSON.parse(ev.data));
  ws.onclose = () => { if (currentDuelId === duelId) setTimeout(() => { if (currentDuelId === duelId) connectWS(duelId); }, 2000); };
}

function closeWS(){ if (ws) { try{ ws.close(); }catch(e){} ws = null; } }

function handleWSMsg(msg){
  if (msg.type === 'room_state'){
    renderDuel(msg);
  } else if (msg.type === 'player_joined' || msg.type === 'player_left' || msg.type === 'drafting_start' || msg.type === 'pick_made'){
    if (msg.type === 'pick_made') Sound && Sound.click && Sound.click();
    renderDuel(msg.duel);
  } else if (msg.type === 'duel_result'){
    handleDuelResult(msg);
  } else if (msg.type === 'cancelled'){
    showToast('Duel cancelled — your entry fee was returned.');
    showLobby();
  } else if (msg.type === 'no_room'){
    showToast('This duel no longer exists.');
    showLobby();
  }
}

function caseName(id){ return caseMeta[id] ? (caseMeta[id].emoji + ' ' + caseMeta[id].name) : id; }

function renderDuel(duel){
  lastDuel = duel;
  const a = duel.players[0], b = duel.players[1];
  const totals = duel.totals || {};
  const iAmIn = duel.players.some(p => p.user_id === myUserId);
  const isMyTurn = duel.turn_user_id === myUserId;

  document.getElementById('vsHeader').innerHTML = `
    ${sideHtml(a, totals)}
    <div class="vs-mid2">VS</div>
    ${sideHtml(b, totals)}
  `;

  const turnBanner = document.getElementById('turnBanner');
  if (duel.status === 'waiting'){
    turnBanner.className = 'turn-banner';
    turnBanner.textContent = `WAITING FOR AN OPPONENT (${duel.players.length}/2)`;
  } else if (duel.status === 'drafting'){
    const turnPlayer = duel.players.find(p => p.user_id === duel.turn_user_id);
    turnBanner.className = 'turn-banner' + (isMyTurn ? ' mine' : '');
    turnBanner.textContent = isMyTurn ? "YOUR TURN — PICK A CASE" : `WAITING ON ${esc(turnPlayer ? turnPlayer.username : 'OPPONENT').toUpperCase()}`;
  } else if (duel.status === 'completed'){
    turnBanner.className = 'turn-banner';
    turnBanner.textContent = 'DUEL COMPLETE';
  } else {
    turnBanner.className = 'turn-banner';
    turnBanner.textContent = (duel.status || '').toUpperCase();
  }

  renderPool(duel, isMyTurn);
  renderPicksFeed(duel);
  renderActions(duel, iAmIn);
}

function sideHtml(p, totals){
  if (!p) return '<div class="vs-side"><div class="vs-user">EMPTY</div></div>';
  const isMe = p.user_id === myUserId;
  const isTurn = lastDuel && lastDuel.turn_user_id === p.user_id && lastDuel.status === 'drafting';
  const total = totals[p.user_id] || 0;
  return `<div class="vs-side ${isMe ? 'me' : ''} ${isTurn ? 'turn' : ''}">
    <div class="vs-user">${esc(p.username || 'Player')}</div>
    <div class="vs-total">$${Number(total).toFixed(2)}</div>
  </div>`;
}

function renderPool(duel, isMyTurn){
  const grid = document.getElementById('poolGrid');
  if (duel.status === 'waiting' || !duel.pool_case_ids || !duel.pool_case_ids.length){
    grid.innerHTML = '';
    return;
  }
  const pickedIds = new Set((duel.picks || []).map(p => p.case_id));
  const draftDone = duel.status !== 'drafting';
  grid.innerHTML = duel.pool_case_ids.map(cid => {
    const picked = pickedIds.has(cid);
    const pickable = !picked && isMyTurn && !draftDone;
    const pick = (duel.picks || []).find(p => p.case_id === cid);
    const meta = caseMeta[cid] || { name: cid, emoji: '📦' };
    return `
      <div class="pool-case ${pickable ? 'pickable' : ''} ${picked ? 'picked' : ''}" ${pickable ? `onclick="pickCase('${cid}')"` : ''}>
        <div style="font-size:32px;">${meta.emoji || '📦'}</div>
        <div class="pc-name">${esc(meta.name || cid)}</div>
        ${picked ? `<div class="pc-picked-by">picked</div>` : ''}
      </div>
    `;
  }).join('');
}

function renderPicksFeed(duel){
  const feed = document.getElementById('picksFeed');
  const label = document.getElementById('feedLabel');
  const picks = duel.picks || [];
  if (!picks.length){
    feed.innerHTML = '';
    label.style.display = 'none';
    return;
  }
  label.style.display = 'block';
  const usersByUid = {};
  duel.players.forEach(p => { usersByUid[p.user_id] = p.username; });
  feed.innerHTML = picks.slice().reverse().map(p => `
    <div class="pick-row">
      <img src="${p.image_url || ''}" alt="" onerror="this.style.display='none'">
      <div class="pr-user">${esc(usersByUid[p.user_id] || 'Player')}</div>
      <div class="pr-item">${esc(p.item_name)}</div>
      <div class="pr-value">$${Number(p.value).toFixed(2)}</div>
    </div>
  `).join('');
}

async function pickCase(caseId){
  if (!currentDuelId) return;
  try{
    await api('/api/games/case-draft-duel/pick', { method: 'POST', body: JSON.stringify({ duel_id: currentDuelId, case_id: caseId }) });
  }catch(e){
    showToast(e.message || 'Could not pick that case');
  }
}

function renderActions(duel, iAmIn){
  const actions = document.getElementById('duelActions');
  if (duel.status === 'waiting' && iAmIn){
    actions.innerHTML = `<button class="btn-backout" onclick="backOut()">↩️  BACK OUT</button>`;
  } else if (duel.status === 'waiting' && !iAmIn){
    actions.innerHTML = `<button class="btn-join-duel" onclick="startDuel(${duel.duel_id})">🃏  ACCEPT THIS DUEL</button>`;
  } else {
    actions.innerHTML = '';
  }
}

async function backOut(){
  if (!currentDuelId) return;
  try{
    await api('/api/games/case-draft-duel/leave', { method: 'POST', body: JSON.stringify({ duel_id: currentDuelId }) });
    showToast('Entry fee returned to your balance.');
    balance = await refreshBal(); updateBal();
    showLobby();
  }catch(e){
    showToast(e.message || 'Could not back out');
  }
}

async function handleDuelResult(msg){
  const iWon = msg.winner_id === myUserId;
  const turnBanner = document.getElementById('turnBanner');
  turnBanner.className = 'turn-banner';
  turnBanner.textContent = iWon ? `🏆 YOU WON $${Number(msg.prize).toFixed(2)}!` : 'YOUR OPPONENT WON THE POT';

  document.getElementById('duelActions').innerHTML =
    '<button class="btn-lobby" onclick="showLobby()">🃏  PLAY AGAIN</button>';

  if (iWon){
    Sound && Sound.win && Sound.win();
    spawnConfettiSafe();
    balance = await refreshBal(); updateBal();
    if (window.maybeBigWin) maybeBigWin(msg.prize, 2);
  } else {
    Sound && Sound.loss && Sound.loss();
  }
}

function spawnConfettiSafe(){
  try{ if (window.spawnConfettiExplosion) spawnConfettiExplosion(); else if (window.spawnConfetti) spawnConfetti('Gold', 60); }catch(e){}
}

function showToast(msg){
  let t = document.getElementById('cdToast');
  if (!t){
    t = document.createElement('div');
    t.id = 'cdToast';
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.95);border:1px solid rgba(255,215,0,0.3);color:#fff;padding:10px 18px;border-radius:10px;font-size:11px;z-index:500;max-width:90vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

async function api(url, opts = {}){
  const r = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok){ const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Error'); }
  return r.json();
}

init();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/static/sw.js").catch(function(){})}</script>
<script src="/static/chat.js"></script>

</body>
</html>
