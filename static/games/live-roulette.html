<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎡  Live Roulette — CS2CaseBot</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#06070a;--accent:#ffd700;--green:#22c55e;--red:#ef4444;--muted:#556;--font:'Orbitron',monospace;}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#c8d0e8;}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(6,7,10,0.98);border-bottom:1px solid rgba(255,215,0,0.12);position:sticky;top:0;z-index:50;}
.back{display:flex;align-items:center;gap:5px;color:#2a2a3a;font-size:10px;letter-spacing:1px;text-decoration:none;}
.back svg{width:14px;height:14px;}
.title{flex:1;font-size:14px;font-weight:900;letter-spacing:3px;color:var(--accent);}
.bal{font-size:13px;font-weight:700;color:var(--accent);font-family:monospace;}
.page{max-width:460px;margin:0 auto;padding:16px 14px 80px;}

.wheel-hdr{text-align:center;margin-bottom:14px;}
.result-num{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;margin:0 auto 8px;font-family:monospace;border:3px solid rgba(255,255,255,0.1);}
.result-num.red{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red);}
.result-num.black{background:rgba(255,255,255,0.05);border-color:#888;color:#ccc;}
.result-num.green{background:rgba(34,197,94,0.15);border-color:var(--green);color:var(--green);}
.result-num.pending{background:rgba(255,215,0,0.08);border-color:var(--accent);color:var(--accent);}
.round-status-banner{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-align:center;}
.round-status-banner.spinning{color:#ff8800;animation:pulse-cd .5s infinite;}
.round-status-banner.settled{color:var(--green);}
@keyframes pulse-cd{0%,100%{opacity:1;}50%{opacity:.5;}}
.round-timer{font-size:clamp(24px,7vw,32px);font-weight:900;color:var(--accent);font-family:monospace;line-height:1;margin-top:4px;text-align:center;}

.section-label{font-size:9px;letter-spacing:2px;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;}
.bet-panel{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.1);border-radius:14px;padding:16px;}
.bet-row{display:flex;gap:8px;margin-bottom:10px;}
.bet-row select, .bet-row input{flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:#fff;font-family:monospace;font-size:12px;}
.btn-place{width:100%;padding:14px;border:none;border-radius:10px;font-family:var(--font);font-size:11px;font-weight:900;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#7a5c00,var(--accent));color:#06070a;}
.btn-place:disabled{opacity:.4;cursor:not-allowed;}

.my-bets{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.bet-chip{display:flex;justify-content:space-between;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px 10px;font-size:10px;}
.bet-chip .bc-win{color:var(--green);font-weight:700;}
.bet-chip .bc-lose{color:var(--muted);}

.players-list{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.player-row{display:flex;justify-content:space-between;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px 10px;font-size:10px;color:#aaa;}
.disclaimer-inline{font-size:10px;color:var(--muted);margin-top:18px;text-align:center;line-height:1.5;}
</style>
    <script src="/static/sound.js"></script>
    <script src="/static/big-win.js"></script>
    <script src="/static/balance-animation.js"></script>
    <script src="/static/page-transitions.js"></script>
<link rel="stylesheet" href="/static/games-shared.css"><script src="/static/js/csrf.js"></script>
</head>
<body>

<header class="hdr">
  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>
  <span class="title">🎡  LIVE ROULETTE</span>
  <span class="bal" id="balDisplay">$—</span>
</header>

<div class="page">

  <div class="wheel-hdr">
    <div class="result-num pending" id="resultNum">?</div>
    <div class="round-status-banner" id="roundStatusBanner">BETTING OPEN</div>
    <div class="round-timer" id="roundTimer">15</div>
  </div>

  <div class="bet-panel">
    <div class="section-label" style="margin-top:0;">Place A Bet</div>
    <div class="bet-row">
      <select id="betTypeSelect" onchange="onBetTypeChange()">
        <option value="straight">Straight (single number) — 36x</option>
        <option value="red">Red — 2x</option>
        <option value="black">Black — 2x</option>
        <option value="odd">Odd — 2x</option>
        <option value="even">Even — 2x</option>
        <option value="low">Low (1-18) — 2x</option>
        <option value="high">High (19-36) — 2x</option>
        <option value="dozen">Dozen (1/2/3) — 3x</option>
        <option value="column">Column (1/2/3) — 3x</option>
        <option value="split">Split (n1,n2) — 18x</option>
        <option value="street">Street (n1,n2,n3) — 12x</option>
        <option value="corner">Corner (n1,n2,n3,n4) — 9x</option>
      </select>
    </div>
    <div class="bet-row" id="betValueRow">
      <input type="text" id="betValueInput" placeholder="e.g. 17" value="17">
    </div>
    <div class="bet-row">
      <input type="number" id="betAmountInput" value="100" min="50" max="750000" placeholder="Amount">
    </div>
    <button class="btn-place" id="placeBtn" onclick="placeBet()">🎡  PLACE BET</button>
  </div>

  <div class="section-label">My Bets This Round</div>
  <div class="my-bets" id="myBets"><div style="color:var(--muted);font-size:10px;">No bets placed yet.</div></div>

  <div class="section-label">Players At The Table</div>
  <div class="players-list" id="playersList"></div>

  <div class="disclaimer-inline">⚠️ One shared spin decides the round for everyone at the table. This is a simulation; balances have no real-world value.</div>
</div>

<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const RED_NUMBERS = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);

let balance = 0, myUserId = null;
let balDisplayInited = false;
let currentRoundId = null;
let ws = null;
let myBetsList = [];

async function init(){
  try{ const d = await api('/api/user/me'); balance = d.balance; myUserId = String(d.user_id); updateBal(); }catch(e){}
  onBetTypeChange();
  const params = new URLSearchParams(location.search);
  const roundParam = params.get('round');
  await joinOpenRound(roundParam ? Number(roundParam) : null);
}

async function joinOpenRound(roundId){
  try{
    const data = await api('/api/games/live-roulette/rounds');
    if (roundId){
      enterRound(roundId, null);
      return;
    }
    if (data.rounds && data.rounds.length){
      enterRound(data.rounds[0].round_id, null);
    } else {
      currentRoundId = null;
      document.getElementById('roundStatusBanner').textContent = 'PLACE A BET TO START A ROUND';
    }
  }catch(e){}
}

function updateBal(){
  const e = document.getElementById('balDisplay');
  const n = '$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});
  if (balDisplayInited && window.animateBalance) { animateBalance(e, e.textContent, n, true); }
  else { e.textContent = n; }
  balDisplayInited = true;
}
async function refreshBal(){ try{ const d = await api('/api/user/me'); return d.balance; }catch(e){ return balance; } }

function onBetTypeChange(){
  const type = document.getElementById('betTypeSelect').value;
  const input = document.getElementById('betValueInput');
  const placeholders = {
    straight: 'e.g. 17', red: '(no value needed)', black: '(no value needed)',
    odd: '(no value needed)', even: '(no value needed)', low: '(no value needed)', high: '(no value needed)',
    dozen: '1, 2, or 3', column: '1, 2, or 3',
    split: 'e.g. 17,18', street: 'e.g. 16,17,18', corner: 'e.g. 17,18,20,21',
  };
  input.placeholder = placeholders[type] || '';
  input.disabled = ['red','black','odd','even','low','high'].includes(type);
  if (input.disabled) input.value = '';
}

async function placeBet(){
  const bet_type = document.getElementById('betTypeSelect').value;
  const bet_value = document.getElementById('betValueInput').value || '0';
  const amount = parseFloat(document.getElementById('betAmountInput').value) || 100;
  document.getElementById('placeBtn').disabled = true;
  try{
    const body = { bet_type, bet_value, amount };
    if (currentRoundId) body.round_id = currentRoundId;
    const data = await api('/api/games/live-roulette/bet', { method: 'POST', body: JSON.stringify(body) });
    balance = await refreshBal(); updateBal();
    myBetsList.push({ bet_type, bet_value, amount });
    renderMyBets();
    enterRound(data.round_id, data.round);
  }catch(e){
    showToast(e.message || 'Could not place bet');
  }finally{
    document.getElementById('placeBtn').disabled = false;
  }
}

function renderMyBets(){
  const el = document.getElementById('myBets');
  if (!myBetsList.length){ el.innerHTML = '<div style="color:var(--muted);font-size:10px;">No bets placed yet.</div>'; return; }
  el.innerHTML = myBetsList.map(b => `
    <div class="bet-chip">
      <span>${esc(b.bet_type)}${b.bet_value ? ' ('+esc(b.bet_value)+')' : ''} — $${Number(b.amount).toFixed(2)}</span>
      <span>pending</span>
    </div>
  `).join('');
}

function enterRound(roundId, round){
  if (currentRoundId === roundId && ws) return;
  currentRoundId = roundId;
  document.getElementById('resultNum').className = 'result-num pending';
  document.getElementById('resultNum').textContent = '?';
  if (round) renderRound(round);
  connectWS(roundId);
}

function renderRound(round){
  const banner = document.getElementById('roundStatusBanner');
  banner.className = 'round-status-banner ' + round.status;
  banner.textContent = round.status === 'betting' ? 'BETTING OPEN'
                      : round.status === 'spinning' ? 'SPINNING…'
                      : round.status === 'settled' ? 'ROUND COMPLETE' : round.status.toUpperCase();

  const list = document.getElementById('playersList');
  list.innerHTML = (round.players || []).map(p => `
    <div class="player-row">
      <span>${esc(p.username || 'Player')}</span>
      <span>$${Number(p.total_bet).toFixed(2)} across ${p.bet_count} bet(s)</span>
    </div>
  `).join('') || '<div style="color:var(--muted);font-size:10px;">No players yet.</div>';
}

function connectWS(roundId){
  closeWS();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/api/games/live-roulette/ws/' + roundId);
  ws.onmessage = (ev) => handleWSMsg(JSON.parse(ev.data));
  ws.onclose = () => { if (currentRoundId === roundId) setTimeout(() => { if (currentRoundId === roundId) connectWS(roundId); }, 2000); };
}

function closeWS(){
  if (ws) { try{ ws.close(); }catch(e){} ws = null; }
}

function handleWSMsg(msg){
  if (msg.type === 'room_state'){
    renderRound(msg);
  } else if (msg.type === 'bet_placed'){
    renderRound(msg.round);
  } else if (msg.type === 'betting_tick'){
    document.getElementById('roundTimer').textContent = msg.seconds;
  } else if (msg.type === 'spinning'){
    document.getElementById('roundStatusBanner').className = 'round-status-banner spinning';
    document.getElementById('roundStatusBanner').textContent = 'SPINNING…';
    document.getElementById('roundTimer').textContent = '';
    Sound && Sound.click && Sound.click();
  } else if (msg.type === 'result'){
    onResult(msg);
  }
}

async function onResult(msg){
  const el = document.getElementById('resultNum');
  el.className = 'result-num ' + msg.color;
  el.textContent = msg.number;
  document.getElementById('roundStatusBanner').className = 'round-status-banner settled';
  document.getElementById('roundStatusBanner').textContent = 'ROUND COMPLETE';

  const list = document.getElementById('playersList');
  list.innerHTML = (msg.players || []).map(p => `
    <div class="player-row">
      <span>${esc(p.username || 'Player')}</span>
      <span class="${p.total_win > 0 ? '' : ''}" style="${p.total_win > 0 ? 'color:var(--green);font-weight:700;' : ''}">
        ${p.total_win > 0 ? '+$' + Number(p.total_win).toFixed(2) : 'No win'}
      </span>
    </div>
  `).join('');

  const mine = (msg.players || []).find(p => String(p.user_id) === myUserId);
  if (mine && mine.bets){
    myBetsList = [];
    document.getElementById('myBets').innerHTML = mine.bets.map(b => `
      <div class="bet-chip">
        <span>${esc(b.bet_type)}${b.bet_value ? ' ('+esc(b.bet_value)+')' : ''} — $${Number(b.amount).toFixed(2)}</span>
        <span class="${b.won ? 'bc-win' : 'bc-lose'}">${b.won ? '+$' + Number(b.win).toFixed(2) : 'lost'}</span>
      </div>
    `).join('');
  }

  balance = await refreshBal(); updateBal();
  if (mine && mine.total_win > 0){
    Sound && Sound.win && Sound.win();
    spawnConfettiSafe();
    if (window.maybeBigWin && mine.total_bet > 0) maybeBigWin(mine.total_bet, mine.total_win / mine.total_bet);
  } else if (mine){
    Sound && Sound.loss && Sound.loss();
  }

  currentRoundId = null;
  setTimeout(() => joinOpenRound(null), 1500);
}

function spawnConfettiSafe(){
  try{ if (window.spawnConfettiExplosion) spawnConfettiExplosion(); else if (window.spawnConfetti) spawnConfetti('Gold', 60); }catch(e){}
}

function showToast(msg){
  let t = document.getElementById('lrToast');
  if (!t){
    t = document.createElement('div');
    t.id = 'lrToast';
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.95);border:1px solid rgba(255,215,0,0.3);color:#fff;padding:10px 18px;border-radius:10px;font-size:11px;z-index:500;max-width:90vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

async function api(url, opts = {}){
  const r = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok){ const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Error'); }
  return r.json();
}

init();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/static/sw.js").catch(function(){})}</script>
<script src="/static/chat.js"></script>

</body>
</html>
