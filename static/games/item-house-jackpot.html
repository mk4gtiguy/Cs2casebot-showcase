<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎲  Item vs House — CS2CaseBot</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#06070a;--accent:#ffd700;--green:#22c55e;--red:#ef4444;--muted:#556;--font:'Orbitron',monospace;}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#c8d0e8;}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(6,7,10,0.98);border-bottom:1px solid rgba(255,215,0,0.12);position:sticky;top:0;z-index:50;}
.back{display:flex;align-items:center;gap:5px;color:#2a2a3a;font-size:10px;letter-spacing:1px;text-decoration:none;transition:color .2s;}
.back:hover{color:var(--accent);}
.back svg{width:14px;height:14px;}
.title{flex:1;font-size:14px;font-weight:900;letter-spacing:3px;color:var(--accent);}
.bal{font-size:13px;font-weight:700;color:var(--accent);font-family:monospace;}
.page{max-width:460px;margin:0 auto;padding:16px 14px 80px;}

.section-label{font-size:9px;letter-spacing:2px;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;}
.picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
.pick-item{border:2px solid rgba(255,255,255,0.06);border-radius:10px;padding:6px;text-align:center;cursor:pointer;background:rgba(255,255,255,0.02);transition:all .15s;}
.pick-item.selected{border-color:var(--accent);background:rgba(255,215,0,0.08);}
.pick-item img{width:100%;aspect-ratio:1;object-fit:contain;background:rgba(0,0,0,0.3);border-radius:6px;margin-bottom:4px;}
.pick-item .pi-name{font-size:9px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pick-item .pi-price{font-size:10px;color:var(--accent);font-weight:700;margin-top:2px;}
.empty-picker{text-align:center;padding:30px 10px;color:var(--muted);font-size:11px;}

.wager-panel{margin-top:16px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.1);border-radius:14px;padding:16px;text-align:center;display:none;}
.wager-panel.show{display:block;}
.wp-item-name{font-size:12px;color:#ddd;margin-bottom:4px;}
.wp-value{font-size:26px;font-weight:900;color:var(--accent);font-family:monospace;}
.wp-odds{font-size:10px;color:var(--muted);margin:8px 0 14px;letter-spacing:1px;}
.wp-outcomes{display:flex;gap:10px;margin-bottom:14px;}
.wp-outcome{flex:1;padding:10px;border-radius:10px;font-size:10px;letter-spacing:1px;}
.wp-outcome.win{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);color:var(--green);}
.wp-outcome.lose{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:var(--red);}
.wp-outcome b{display:block;font-size:14px;margin-top:2px;font-family:monospace;}
.btn-wager{width:100%;padding:15px;border:none;border-radius:12px;font-family:var(--font);font-size:12px;font-weight:900;letter-spacing:2px;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#7a5c00,var(--accent));color:#06070a;box-shadow:0 4px 20px rgba(255,215,0,0.3);}
.btn-wager:hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(255,215,0,0.5);}
.btn-wager:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}

.reveal{display:none;text-align:center;padding:30px 10px;}
.reveal.show{display:block;}
.reveal-coin{font-size:60px;margin-bottom:10px;animation:spin-coin 1.1s ease-out;}
@keyframes spin-coin{0%{transform:rotateY(0);}100%{transform:rotateY(1080deg);}}
.reveal-result{font-size:18px;font-weight:900;margin-bottom:6px;}
.reveal-result.won{color:var(--green);}
.reveal-result.lost{color:var(--red);}
.reveal-sub{font-size:11px;color:var(--muted);margin-bottom:18px;}
.btn-again{width:100%;padding:14px;border-radius:10px;font-family:var(--font);font-size:11px;font-weight:900;letter-spacing:2px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.03);color:#ccc;}

.cond-badge{font-size:7px;font-weight:700;padding:1px 4px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px;display:inline-block;}
.cond-fn{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3);}
.cond-mw{background:rgba(134,239,172,.12);color:#86efac;border:1px solid rgba(134,239,172,.25);}
.cond-ft{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25);}
.cond-ww{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.25);}
.cond-bs{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25);}

.disclaimer-inline{font-size:10px;color:var(--muted);margin-top:18px;text-align:center;line-height:1.5;}
</style>
    <script src="/static/sound.js"></script>
    <script src="/static/big-win.js"></script>
    <script src="/static/balance-animation.js"></script>
    <script src="/static/page-transitions.js"></script>
<link rel="stylesheet" href="/static/games-shared.css"><script src="/static/js/csrf.js"></script>
</head>
<body>

<header class="hdr">
  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>
  <span class="title">🎲  ITEM VS HOUSE</span>
  <span class="bal" id="balDisplay">$—</span>
</header>

<div class="page">

  <div id="pickView">
    <div class="section-label">Choose An Item To Wager</div>
    <div class="picker-grid" id="pickerGrid"><div class="empty-picker">Loading inventory…</div></div>

    <div class="wager-panel" id="wagerPanel">
      <div class="wp-item-name" id="wpItemName"></div>
      <div class="wp-value" id="wpValue">$0.00</div>
      <div class="wp-odds" id="wpOdds"></div>
      <div class="wp-outcomes">
        <div class="wp-outcome win">WIN<b id="wpWinAmt">$0.00</b></div>
        <div class="wp-outcome lose">LOSE<b>ITEM</b></div>
      </div>
      <button class="btn-wager" id="wagerBtn" onclick="confirmWager()">🎲  WAGER AGAINST THE HOUSE</button>
    </div>

    <div class="disclaimer-inline">⚠️ Stake a real inventory item against the house. Win: item returned + a cash bonus equal to its value. Lose: item is gone. This is a simulation; items have no real-world value.</div>
  </div>

  <div class="reveal" id="revealView">
    <div class="reveal-coin" id="revealCoin">🎲</div>
    <div class="reveal-result" id="revealResult"></div>
    <div class="reveal-sub" id="revealSub"></div>
    <button class="btn-again" onclick="resetView()">🎲  WAGER AGAIN</button>
  </div>

</div>

<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const CONDITION_SHORT = { 'Factory New':'FN', 'Minimal Wear':'MW', 'Field-Tested':'FT', 'Well-Worn':'WW', 'Battle-Scarred':'BS' };
function condBadgeHtml(condition) {
  const short = CONDITION_SHORT[condition];
  if (!short) return '';
  return `<span class="cond-badge cond-${short.toLowerCase()}">${short}</span>`;
}

let balance = 0, balDisplayInited = false;
let pickerItems = [], selectedItem = null;

async function init(){
  try{ const d = await api('/api/user/me'); balance = d.balance; updateBal(); }catch(e){}
  loadPicker();
}

function updateBal(){
  const e = document.getElementById('balDisplay');
  const n = '$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});
  if (balDisplayInited && window.animateBalance) { animateBalance(e, e.textContent, n, true); }
  else { e.textContent = n; }
  balDisplayInited = true;
}
async function refreshBal(){ try{ const d = await api('/api/user/me'); return d.balance; }catch(e){ return balance; } }

async function loadPicker(){
  const grid = document.getElementById('pickerGrid');
  try{
    const data = await api('/api/user/me/inventory?limit=200');
    pickerItems = (data.items || []).filter(it => Number(it.price) >= 0.50 && !it.in_loadout && !it.protected);
    if (!pickerItems.length){
      grid.innerHTML = '<div class="empty-picker">No eligible items (need a kept, unequipped, unprotected item worth $0.50+).</div>';
      return;
    }
    grid.innerHTML = pickerItems.map(it => `
      <div class="pick-item" id="pick-${it.id}" onclick="selectItem(${it.id})">
        <img src="${it.image_url || ''}" alt="" onerror="this.style.display='none'">
        <div class="pi-name">${esc(it.display_name || it.item_name)}</div>
        <div class="pi-price">$${Number(it.price).toFixed(2)}</div>
      </div>
    `).join('');
  }catch(e){
    grid.innerHTML = '<div class="empty-picker">Error loading inventory.</div>';
  }
}

function selectItem(id){
  Sound && Sound.click && Sound.click();
  document.querySelectorAll('.pick-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('pick-'+id).classList.add('selected');
  selectedItem = pickerItems.find(it => it.id === id);
  const panel = document.getElementById('wagerPanel');
  panel.classList.add('show');
  document.getElementById('wpItemName').innerHTML = esc(selectedItem.display_name || selectedItem.item_name) + (selectedItem.condition ? ' ' + condBadgeHtml(selectedItem.condition) : '');
  document.getElementById('wpValue').textContent = '$' + Number(selectedItem.price).toFixed(2);
  document.getElementById('wpWinAmt').textContent = '$' + Number(selectedItem.price).toFixed(2);
  document.getElementById('wpOdds').textContent = '~48% CHANCE TO WIN — DOUBLE OR NOTHING';
  document.getElementById('wagerBtn').disabled = false;
}

async function confirmWager(){
  if (!selectedItem) return;
  const btn = document.getElementById('wagerBtn');
  btn.disabled = true;
  try{
    const data = await api('/api/games/jackpot/house/wager', { method: 'POST', body: JSON.stringify({ inventory_id: selectedItem.id }) });
    showReveal(data);
  }catch(e){
    btn.disabled = false;
    showToast(e.message || 'Could not place wager');
  }
}

async function showReveal(data){
  document.getElementById('pickView').style.display = 'none';
  const rv = document.getElementById('revealView');
  rv.classList.add('show');
  const coin = document.getElementById('revealCoin');
  coin.textContent = '🎲';
  coin.style.animation = 'none';
  void coin.offsetWidth;
  coin.style.animation = 'spin-coin 1.1s ease-out';

  await new Promise(r => setTimeout(r, 1100));

  const resultEl = document.getElementById('revealResult');
  const subEl = document.getElementById('revealSub');
  if (data.won){
    coin.textContent = '🏆';
    resultEl.className = 'reveal-result won';
    resultEl.textContent = 'YOU WON!';
    subEl.textContent = `Item returned + $${Number(data.payout).toFixed(2)} bonus credited.`;
    Sound && Sound.win && Sound.win();
    spawnConfettiSafe();
    balance = await refreshBal(); updateBal();
    if (window.maybeBigWin) maybeBigWin(data.item.value, 2);
  } else {
    coin.textContent = '💀';
    resultEl.className = 'reveal-result lost';
    resultEl.textContent = 'THE HOUSE WINS';
    subEl.textContent = `${esc(data.item.item_name)} was lost.`;
    Sound && Sound.loss && Sound.loss();
  }
}

function resetView(){
  document.getElementById('revealView').classList.remove('show');
  document.getElementById('pickView').style.display = 'block';
  document.getElementById('wagerPanel').classList.remove('show');
  selectedItem = null;
  document.getElementById('wagerBtn').disabled = false;
  loadPicker();
}

function spawnConfettiSafe(){
  try{ if (window.spawnConfettiExplosion) spawnConfettiExplosion(); else if (window.spawnConfetti) spawnConfetti('Gold', 60); }catch(e){}
}

function showToast(msg){
  let t = document.getElementById('ihjToast');
  if (!t){
    t = document.createElement('div');
    t.id = 'ihjToast';
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.95);border:1px solid rgba(255,215,0,0.3);color:#fff;padding:10px 18px;border-radius:10px;font-size:11px;z-index:500;max-width:90vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

async function api(url, opts = {}){
  const r = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok){ const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Error'); }
  return r.json();
}

init();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/static/sw.js").catch(function(){})}</script>
<script src="/static/chat.js"></script>

</body>
</html>
