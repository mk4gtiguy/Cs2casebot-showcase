<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎰  Sync-Spin Slots — CS2CaseBot</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#06070a;--accent:#ffd700;--green:#22c55e;--red:#ef4444;--muted:#556;--font:'Orbitron',monospace;}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#c8d0e8;}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(6,7,10,0.98);border-bottom:1px solid rgba(255,215,0,0.12);position:sticky;top:0;z-index:50;}
.back{display:flex;align-items:center;gap:5px;color:#2a2a3a;font-size:10px;letter-spacing:1px;text-decoration:none;}
.back svg{width:14px;height:14px;}
.title{flex:1;font-size:14px;font-weight:900;letter-spacing:3px;color:var(--accent);}
.bal{font-size:13px;font-weight:700;color:var(--accent);font-family:monospace;}
.page{max-width:460px;margin:0 auto;padding:16px 14px 80px;}

.section-label{font-size:9px;letter-spacing:2px;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;}
.round-list{display:flex;flex-direction:column;gap:8px;}
.round-card{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.1);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.round-card:hover{border-color:rgba(255,215,0,0.35);background:rgba(255,215,0,0.03);}
.round-card .rc-icon{font-size:22px;}
.round-card .rc-info{flex:1;}
.round-card .rc-meta{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.5px;}
.round-card .rc-status{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:1px;background:rgba(255,215,0,0.12);color:var(--accent);}
.empty-lobby{text-align:center;padding:30px 10px;color:var(--muted);font-size:11px;}

.bet-panel{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.1);border-radius:14px;padding:16px;margin-top:14px;}
.bet-row{display:flex;gap:8px;margin-bottom:10px;}
.bet-row input{flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:#fff;font-family:monospace;font-size:14px;}
.qb-row{display:flex;gap:6px;margin-bottom:12px;}
.qb-row button{flex:1;padding:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#aaa;border-radius:6px;font-size:10px;cursor:pointer;}
.btn-lockin{width:100%;padding:15px;border:none;border-radius:12px;font-family:var(--font);font-size:12px;font-weight:900;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#7a5c00,var(--accent));color:#06070a;box-shadow:0 4px 20px rgba(255,215,0,0.3);}
.btn-lockin:disabled{opacity:.4;cursor:not-allowed;}

.round-hdr{text-align:center;margin-bottom:14px;}
.round-status-banner{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);}
.round-status-banner.spinning{color:#ff8800;animation:pulse-cd .5s infinite;}
.round-status-banner.settled{color:var(--green);}
@keyframes pulse-cd{0%,100%{opacity:1;}50%{opacity:.5;}}
.round-timer{font-size:clamp(30px,9vw,44px);font-weight:900;color:var(--accent);font-family:monospace;line-height:1;margin-top:4px;}

.players-grid{display:flex;flex-direction:column;gap:8px;margin:16px 0;}
.player-slot{background:rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px 14px;}
.player-slot.me{border-color:rgba(255,215,0,0.35);}
.player-slot.win{border-color:var(--green);background:rgba(34,197,94,0.08);}
.ps-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ps-name{font-size:11px;color:#ccc;}
.ps-bet{font-size:10px;color:var(--muted);font-family:monospace;}
.reels{display:flex;gap:6px;justify-content:center;}
.reel{width:44px;height:44px;background:rgba(0,0,0,0.5);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .15s;}
.reel.spinning{animation:reel-spin .12s linear infinite;}
@keyframes reel-spin{0%{transform:translateY(0);}50%{transform:translateY(-4px);}100%{transform:translateY(0);}}
.ps-result{text-align:center;font-size:10px;color:var(--muted);margin-top:6px;}
.ps-result.win{color:var(--green);font-weight:700;}

.round-actions{display:flex;gap:8px;margin-top:6px;}
.btn-lobby{flex:1;padding:14px;border-radius:10px;font-family:var(--font);font-size:11px;font-weight:900;letter-spacing:2px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.03);color:#ccc;}
.disclaimer-inline{font-size:10px;color:var(--muted);margin-top:18px;text-align:center;line-height:1.5;}
</style>
    <script src="/static/sound.js"></script>
    <script src="/static/big-win.js"></script>
    <script src="/static/balance-animation.js"></script>
    <script src="/static/page-transitions.js"></script>
<link rel="stylesheet" href="/static/games-shared.css"><script src="/static/js/csrf.js"></script>
</head>
<body>

<header class="hdr">
  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>
  <span class="title">🎰  SYNC-SPIN SLOTS</span>
  <span class="bal" id="balDisplay">$—</span>
</header>

<div class="page">

  <!-- LOBBY -->
  <div id="lobbyView">
    <div class="section-label">Open Rounds</div>
    <div class="round-list" id="roundList"></div>
    <div class="bet-panel">
      <div class="section-label" style="margin-top:0;">Lock In A Bet</div>
      <div class="bet-row"><input type="number" id="betInput" value="100" min="50" max="750000"></div>
      <div class="qb-row">
        <button onclick="setBet(100)">$100</button>
        <button onclick="setBet(500)">$500</button>
        <button onclick="setBet(1000)">$1K</button>
        <button onclick="setBet(5000)">$5K</button>
      </div>
      <button class="btn-lockin" id="lockInBtn" onclick="lockIn(null)">🎰  LOCK IN — JOIN NEXT ROUND</button>
    </div>
    <div class="disclaimer-inline">⚠️ Everyone's reels spin together, but each player's result is their own independent spin. This is a simulation; balances have no real-world value.</div>
  </div>

  <!-- ROUND VIEW -->
  <div id="roundView" style="display:none;">
    <div class="round-hdr">
      <div class="round-status-banner" id="roundStatusBanner">LOCKING IN…</div>
      <div class="round-timer" id="roundTimer">8</div>
    </div>
    <div class="players-grid" id="playersGrid"></div>
    <div class="round-actions">
      <button class="btn-lobby" onclick="showLobby()">← BACK TO LOBBY</button>
    </div>
  </div>

</div>

<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const REEL_EMOJIS = ['🍒','🍋','🍊','🍇','💎','7️⃣','🎰'];

let balance = 0, myUserId = null;
let balDisplayInited = false;
let currentRoundId = null;
let ws = null;
let lobbyTimer = null;
let lastRound = null;

async function init(){
  try{ const d = await api('/api/user/me'); balance = d.balance; myUserId = String(d.user_id); updateBal(); }catch(e){}
  const params = new URLSearchParams(location.search);
  const roundParam = params.get('round');
  if (roundParam){ enterRound(Number(roundParam), null); }
  else { showLobby(); }
}

function updateBal(){
  const e = document.getElementById('balDisplay');
  const n = '$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});
  if (balDisplayInited && window.animateBalance) { animateBalance(e, e.textContent, n, true); }
  else { e.textContent = n; }
  balDisplayInited = true;
}
async function refreshBal(){ try{ const d = await api('/api/user/me'); return d.balance; }catch(e){ return balance; } }

function setBet(v){ document.getElementById('betInput').value = v; }

// ============================================================
// LOBBY
// ============================================================

function showLobby(){
  closeWS();
  currentRoundId = null;
  document.getElementById('roundView').style.display = 'none';
  document.getElementById('lobbyView').style.display = 'block';
  loadLobby();
  if (lobbyTimer) clearInterval(lobbyTimer);
  lobbyTimer = setInterval(loadLobby, 4000);
}

async function loadLobby(){
  try{
    const data = await api('/api/games/sync-slots/rounds');
    const list = document.getElementById('roundList');
    if (!data.rounds.length){
      list.innerHTML = '<div class="empty-lobby">No open rounds right now — lock in a bet to start one!</div>';
      return;
    }
    list.innerHTML = data.rounds.map(r => `
      <div class="round-card" onclick="lockIn(${r.round_id})">
        <div class="rc-icon">🎰</div>
        <div class="rc-info">
          <div class="ps-name">Round #${r.round_id}</div>
          <div class="rc-meta">${r.player_count} PLAYERS LOCKED IN</div>
        </div>
        <div class="rc-status">JOIN</div>
      </div>
    `).join('');
  }catch(e){}
}

async function lockIn(roundId){
  const amount = parseFloat(document.getElementById('betInput').value) || 100;
  document.getElementById('lockInBtn').disabled = true;
  try{
    const body = { amount };
    if (roundId) body.round_id = roundId;
    const data = await api('/api/games/sync-slots/lock-in', { method: 'POST', body: JSON.stringify(body) });
    balance = await refreshBal(); updateBal();
    enterRound(data.round_id, data.round);
  }catch(e){
    showToast(e.message || 'Could not lock in');
  }finally{
    document.getElementById('lockInBtn').disabled = false;
  }
}

// ============================================================
// ROUND VIEW
// ============================================================

function enterRound(roundId, round){
  if (lobbyTimer) { clearInterval(lobbyTimer); lobbyTimer = null; }
  currentRoundId = roundId;
  lastRound = round;
  document.getElementById('lobbyView').style.display = 'none';
  document.getElementById('roundView').style.display = 'block';
  if (round) renderRound(round);
  connectWS(roundId);
}

function renderRound(round){
  lastRound = round;
  const banner = document.getElementById('roundStatusBanner');
  banner.className = 'round-status-banner ' + round.status;
  banner.textContent = round.status === 'locking' ? 'LOCKING IN…'
                      : round.status === 'spinning' ? 'SPINNING…'
                      : round.status === 'settled' ? 'ROUND COMPLETE' : round.status.toUpperCase();

  const grid = document.getElementById('playersGrid');
  grid.innerHTML = (round.players || []).map(p => {
    const isMe = String(p.user_id) === myUserId;
    return `
      <div class="player-slot ${isMe ? 'me' : ''}" id="slot-${p.user_id}">
        <div class="ps-top">
          <span class="ps-name">${esc(p.username || 'Player')}${isMe ? ' (you)' : ''}</span>
          <span class="ps-bet">$${Number(p.amount).toFixed(2)}</span>
        </div>
        <div class="reels" id="reels-${p.user_id}">
          <div class="reel">❔</div><div class="reel">❔</div><div class="reel">❔</div>
        </div>
        <div class="ps-result" id="result-${p.user_id}"></div>
      </div>
    `;
  }).join('');
}

function connectWS(roundId){
  closeWS();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/api/games/sync-slots/ws/' + roundId);
  ws.onmessage = (ev) => handleWSMsg(JSON.parse(ev.data));
  ws.onclose = () => { if (currentRoundId === roundId) setTimeout(() => { if (currentRoundId === roundId) connectWS(roundId); }, 2000); };
}

function closeWS(){
  if (ws) { try{ ws.close(); }catch(e){} ws = null; }
}

function handleWSMsg(msg){
  if (msg.type === 'room_state'){
    renderRound(msg);
  } else if (msg.type === 'player_locked_in'){
    renderRound(msg.round);
  } else if (msg.type === 'lock_tick'){
    document.getElementById('roundTimer').textContent = msg.seconds;
  } else if (msg.type === 'spin_now'){
    document.getElementById('roundTimer').textContent = '';
    document.querySelectorAll('.reel').forEach(r => r.classList.add('spinning'));
    document.querySelectorAll('.reel').forEach(r => r.textContent = REEL_EMOJIS[Math.floor(Math.random() * REEL_EMOJIS.length)]);
    Sound && Sound.click && Sound.click();
  } else if (msg.type === 'results'){
    onResults(msg);
  }
}

async function onResults(msg){
  const banner = document.getElementById('roundStatusBanner');
  banner.className = 'round-status-banner settled';
  banner.textContent = 'ROUND COMPLETE';

  let myWin = 0, myBet = 0;
  (msg.players || []).forEach(p => {
    const reelsEl = document.getElementById('reels-' + p.user_id);
    const resultEl = document.getElementById('result-' + p.user_id);
    const slotEl = document.getElementById('slot-' + p.user_id);
    if (reelsEl){
      reelsEl.querySelectorAll('.reel').forEach((r, i) => {
        r.classList.remove('spinning');
        r.textContent = p.symbols[i];
      });
    }
    if (resultEl){
      if (p.win > 0){
        resultEl.className = 'ps-result win';
        resultEl.textContent = `+$${Number(p.win).toFixed(2)} (${p.combo})`;
        if (slotEl) slotEl.classList.add('win');
      } else {
        resultEl.className = 'ps-result';
        resultEl.textContent = 'No win';
      }
    }
    if (String(p.user_id) === myUserId){ myWin = p.win; myBet = p.amount; }
  });

  balance = await refreshBal(); updateBal();
  if (myWin > 0){
    Sound && Sound.win && Sound.win();
    spawnConfettiSafe();
    if (window.maybeBigWin && myBet > 0) maybeBigWin(myBet, myWin / myBet);
  } else {
    Sound && Sound.loss && Sound.loss();
  }
}

function spawnConfettiSafe(){
  try{ if (window.spawnConfettiExplosion) spawnConfettiExplosion(); else if (window.spawnConfetti) spawnConfetti('Gold', 60); }catch(e){}
}

// ============================================================
// TOAST / UTIL
// ============================================================

function showToast(msg){
  let t = document.getElementById('ssToast');
  if (!t){
    t = document.createElement('div');
    t.id = 'ssToast';
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.95);border:1px solid rgba(255,215,0,0.3);color:#fff;padding:10px 18px;border-radius:10px;font-size:11px;z-index:500;max-width:90vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

async function api(url, opts = {}){
  const r = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok){ const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Error'); }
  return r.json();
}

init();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/static/sw.js").catch(function(){})}</script>
<script src="/static/chat.js"></script>

</body>
</html>
