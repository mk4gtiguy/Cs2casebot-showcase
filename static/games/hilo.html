<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>🃏  Hi-Lo — CS2CaseBot</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{--bg:#050a07;--felt:#0a1a0e;--gold:#ffd700;--green:#22c55e;--red:#ef4444;--font:'Orbitron',monospace;--card-font:'Playfair Display',serif;}

html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#d0e8d8;}

body{background:radial-gradient(ellipse 100% 70% at 50% 0%,rgba(10,26,14,0.8),var(--bg) 70%);}

.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(5,10,7,0.98);border-bottom:1px solid rgba(34,197,94,0.12);position:sticky;top:0;z-index:50;}

.back{display:flex;align-items:center;gap:5px;color:#2a4a30;font-size:10px;letter-spacing:1px;text-decoration:none;transition:color .2s;}

.back:hover{color:var(--green);}

.back svg{width:14px;height:14px;}

.title{flex:1;font-size:14px;font-weight:900;letter-spacing:3px;color:var(--gold);}

.bal{font-size:13px;font-weight:700;color:var(--gold);font-family:monospace;}

.page{max-width:420px;margin:0 auto;padding:16px 14px 80px;}

.table{background:var(--felt);border:2px solid rgba(34,197,94,0.15);border-radius:24px;padding:24px 16px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:inset 0 2px 20px rgba(0,0,0,0.5);}

.table::before{content:'';position:absolute;inset:4px;border:1px solid rgba(34,197,94,0.08);border-radius:20px;pointer-events:none;}

.chain-counter{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px;}

.chain-num{font-size:clamp(40px,12vw,64px);font-weight:900;font-family:monospace;line-height:1;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,0.3);}

.chain-label{font-size:8px;letter-spacing:2px;color:#2a4a30;text-align:center;}

.chain-mult{font-size:clamp(18px,5vw,26px);font-weight:900;font-family:monospace;color:var(--green);}

.card-area{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:20px;}

.playing-card{width:80px;height:112px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;box-shadow:0 8px 24px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);transition:transform .3s;}

.playing-card.face{background:linear-gradient(135deg,#fff,#f0f0f0);color:#111;}

.playing-card.face-red{background:linear-gradient(135deg,#fff,#f0f0f0);color:#cc0000;}

.playing-card.back{background:linear-gradient(135deg,#1a3a2a,#0d2018);border:1px solid rgba(34,197,94,0.2);}

.playing-card.flip-in{animation:flip-card .3s ease;}

@keyframes flip-card{0%{transform:rotateY(90deg) scale(0.8);opacity:0;}100%{transform:rotateY(0) scale(1);opacity:1;}}

.card-rank{font-size:28px;font-weight:700;font-family:var(--card-font);line-height:1;}

.card-suit{font-size:22px;line-height:1;}

.card-corner{position:absolute;top:6px;left:8px;font-size:11px;font-weight:700;font-family:var(--card-font);line-height:1.2;}

.card-corner .cs{font-size:10px;}

.back-pattern{font-size:30px;opacity:0.3;}

.odds-row{display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;margin-bottom:16px;}

.odds-btn{padding:14px 10px;border-radius:12px;border:2px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);text-align:center;cursor:pointer;transition:all .2s;}

.odds-btn.higher{border-color:rgba(34,197,94,0.2);}

.odds-btn.lower{border-color:rgba(239,68,68,0.2);}

.odds-btn.higher:hover,.odds-btn.higher.active{border-color:var(--green);background:rgba(34,197,94,0.12);box-shadow:0 0 20px rgba(34,197,94,0.15);}

.odds-btn.lower:hover,.odds-btn.lower.active{border-color:var(--red);background:rgba(239,68,68,0.1);}

.odds-icon{font-size:22px;margin-bottom:4px;}

.odds-name{font-size:9px;font-weight:700;letter-spacing:1px;}

.odds-btn.higher .odds-name{color:var(--green);}

.odds-btn.lower .odds-name{color:var(--red);}

.odds-mult{font-size:12px;font-weight:900;font-family:monospace;margin-top:2px;}

.odds-btn.higher .odds-mult{color:var(--green);}

.odds-btn.lower .odds-mult{color:var(--red);}

.odds-divider{display:flex;align-items:center;justify-content:center;font-size:9px;color:#2a4a30;font-weight:700;}

.result-line{min-height:28px;text-align:center;font-size:11px;font-weight:700;letter-spacing:2px;display:flex;align-items:center;justify-content:center;}

.result-line.win{color:var(--green);}

.result-line.bust{color:var(--red);}

.result-line.idle{color:#2a4a30;}

.cashout-strip{display:flex;gap:10px;align-items:center;margin-top:12px;}

.btn-cashout{flex:1;padding:14px;border:1px solid rgba(255,215,0,0.3);border-radius:10px;background:rgba(255,215,0,0.08);color:var(--gold);font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;}

.btn-cashout:not(:disabled):hover{background:rgba(255,215,0,0.15);border-color:var(--gold);}

.btn-cashout:disabled{opacity:.3;cursor:not-allowed;}

.potential-win{text-align:center;font-size:11px;font-family:monospace;}

.potential-win .pw-val{font-size:18px;font-weight:900;color:var(--gold);}

.potential-win .pw-label{font-size:8px;color:#2a4a30;letter-spacing:1px;}

.chain-history{display:flex;gap:4px;flex-wrap:wrap;min-height:24px;margin-top:12px;}

.chain-pip{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;animation:pip-pop .2s cubic-bezier(.34,1.56,.64,1);}

@keyframes pip-pop{0%{transform:scale(0);}100%{transform:scale(1);}}

.chain-pip.win{background:rgba(34,197,94,0.25);border:1px solid rgba(34,197,94,0.4);color:var(--green);}

.chain-pip.bust{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:var(--red);}

.bet-section{background:rgba(0,0,0,0.4);border:1px solid rgba(34,197,94,0.08);border-radius:14px;padding:14px;margin-bottom:14px;}

.bl{font-size:8px;color:#2a4a30;letter-spacing:2px;margin-bottom:8px;}

.bet-row{display:flex;gap:8px;margin-bottom:8px;}

.bet-inp{flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(34,197,94,0.1);border-radius:8px;padding:10px 12px;color:#d0e8d8;font-family:var(--font);font-size:13px;font-weight:700;outline:none;text-align:center;}

.bet-inp:focus{border-color:rgba(34,197,94,0.3);}

.adj{padding:10px 14px;background:rgba(34,197,94,0.04);border:1px solid rgba(34,197,94,0.08);border-radius:8px;color:#2a4a30;font-family:var(--font);font-size:11px;cursor:pointer;transition:all .15s;}

.adj:hover{color:var(--green);}

.qrow{display:flex;gap:5px;}

.qb{flex:1;padding:7px 3px;background:rgba(34,197,94,0.04);border:1px solid rgba(34,197,94,0.08);border-radius:6px;color:#2a4a30;font-size:8px;letter-spacing:1px;cursor:pointer;text-align:center;transition:all .15s;}

.qb:hover{border-color:var(--green);color:var(--green);}

.btn-start{width:100%;padding:16px;border:none;border-radius:12px;font-family:var(--font);font-size:13px;font-weight:900;letter-spacing:3px;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#1a4a20,var(--green));color:#050a07;box-shadow:0 4px 20px rgba(34,197,94,0.3);}

.btn-start:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(34,197,94,0.5);}

.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:200;}

#flash.g{background:radial-gradient(ellipse at 50% 30%,rgba(34,197,94,0.2),transparent 70%);}

#flash.r{background:radial-gradient(ellipse at 50% 30%,rgba(239,68,68,0.2),transparent 70%);}

#flash.show{animation:fl .4s ease;}

@keyframes fl{0%,100%{opacity:0;}30%{opacity:1;}}

</style>

    <script src="/static/sound.js"></script>

    <script src="/static/big-win.js"></script>


    <script src="/static/balance-animation.js"></script>


    <script src="/static/page-transitions.js"></script>


    <script src="/static/autoplay.js"></script>


<link rel="stylesheet" href="/static/games-shared.css"><script src="/static/js/csrf.js"></script>


</head>

<body>

<div id="flash"></div>

<header class="hdr">

  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>

  <span class="title">🃏  HI-LO</span>

  <span class="bal" id="balDisplay">$—</span>

</header>

<div class="page">

  <div class="table">

    <div class="chain-counter">

      <div style="text-align:center"><div class="chain-label">CHAIN</div><div class="chain-num" id="chainNum">0</div></div>

      <div style="width:1px;height:60px;background:rgba(34,197,94,0.15);"></div>

      <div style="text-align:center"><div class="chain-label">MULTIPLIER</div><div class="chain-mult" id="chainMult">1.00×</div></div>

    </div>

    <div class="card-area">

      <div class="playing-card back" id="prevCard"><div class="back-pattern">🂠</div></div>

      <div style="font-size:22px;color:#2a4a30;">➡️</div>

      <div class="playing-card back" id="currCard"><div class="back-pattern">🂠</div></div>

    </div>

    <div class="odds-row">

      <div class="odds-btn higher" id="btnHigher" onclick="guess('higher')">

        <div class="odds-icon">📈</div><div class="odds-name">HIGHER</div><div class="odds-mult" id="higherMult">—</div><div style="font-size:8px;color:#2a4a30;margin-top:2px;" id="higherPct">—</div>

      </div>

      <div class="odds-divider">VS</div>

      <div class="odds-btn lower" id="btnLower" onclick="guess('lower')">

        <div class="odds-icon">📉</div><div class="odds-name">LOWER</div><div class="odds-mult" id="lowerMult">—</div><div style="font-size:8px;color:#2a4a30;margin-top:2px;" id="lowerPct">—</div>

      </div>

    </div>

    <div class="result-line idle" id="resultLine">START A NEW GAME TO PLAY</div>

    <div class="cashout-strip">

      <div class="potential-win"><div class="pw-val" id="potWin">$0</div><div class="pw-label">POTENTIAL WIN</div></div>

      <button class="btn-cashout" id="btnCashout" onclick="cashout()" disabled>💰  CASH OUT</button>

    </div>

    <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">

      <span style="font-size:8px;color:#2a4a30;letter-spacing:1px;flex-shrink:0;">AUTO CASHOUT AT</span>

      <input id="autoCashoutInp" type="number" value="" min="1.1" step="0.1" placeholder="MULT×" style="flex:1;background:rgba(0,0,0,0.4);border:1px solid rgba(34,197,94,0.1);border-radius:6px;padding:6px 8px;color:#d0e8d8;font-family:var(--font);font-size:11px;font-weight:700;text-align:center;outline:none;">

      <label style="display:flex;align-items:center;gap:4px;font-size:8px;color:#2a4a30;cursor:pointer;flex-shrink:0;"><input type="checkbox" id="autoCashoutOn" style="accent-color:var(--green);"> ON</label>

    </div>

    <div class="chain-history" id="chainHistory"></div>

  </div>

  <div class="bet-section">

    <div class="bl">BET AMOUNT</div>

    <div class="bet-row">

      <button class="adj" onclick="halveBet()">½</button>

      <input class="bet-inp" id="betInp" type="number" value="500" min="50">

      <button class="adj" onclick="doubleBet()">2×</button>

    </div>

    <div class="qrow">

      <div class="qb" onclick="qb(100)">$100</div><div class="qb" onclick="qb(500)">$500</div>

      <div class="qb" onclick="qb(1000)">$1K</div><div class="qb" onclick="qb(5000)">$5K</div><div class="qb" onclick="qb(10000)">$10K</div>

    </div>

  </div>

  <button class="btn-start" id="startBtn" onclick="startGame()">🃏  DEAL NEW HAND</button>

</div>

<script>

const RED_SUITS=['♥','♦'];

let balance=0,gameActive=false,acting=false,currentCard=null,chainLen=0,chainMult=1;

async function init(){try{const d=await api('/api/user/me');balance=d.balance;updateBal();}catch(e){}}

function updateBal(){var e=document.getElementById('balDisplay'),c=e.textContent||'',n='$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});if(c&&c!=='$—'&&c!==n){var p=parseFloat(c.replace(/[,$]/g,''));if(!isNaN(p)&&p!==balance){animateBalance(e,'$'+p.toLocaleString(undefined,{maximumFractionDigits:0}),n,balance>=p);return}}e.textContent=n}

function qb(v){Sound.click();document.getElementById('betInp').value=v;}


function halveBet(){Sound.click();document.getElementById('betInp').value=Math.max(50,Math.floor(parseInt(document.getElementById('betInp').value||500)/2));}


function doubleBet(){Sound.click();document.getElementById('betInp').value=Math.min(balance,parseInt(document.getElementById('betInp').value||500)*2);}

async function startGame(){


  if(gameActive||acting) return;


  Sound.click();Sound.chip();


  const bet=parseInt(document.getElementById('betInp').value)||500;

  if(bet>balance){setResult('❌ INSUFFICIENT BALANCE','idle');Sound.error();return;}

  acting=true;document.getElementById('startBtn').disabled=true;

  document.getElementById('chainHistory').innerHTML='';

  chainLen=0;chainMult=1;updateChainDisplay();setResult('DEALING…','idle');

  try{

    const d=await api('/api/games/easy/hilo/start',{method:'POST',body:JSON.stringify({amount:bet})});

    currentCard=d.card;Sound.card();renderCard('currCard',currentCard);


    document.getElementById('prevCard').innerHTML='<div class="back-pattern">🂠</div>';

    document.getElementById('prevCard').className='playing-card back';

    updateOdds(d.higher_mult,d.lower_mult);gameActive=true;

    document.getElementById('btnCashout').disabled=true;

    setResult('HIGHER OR LOWER?','idle');balance=await refreshBal();updateBal();updatePotWin(bet,1);

  }catch(e){setResult('ERROR: '+e.message,'idle');}

  finally{acting=false;document.getElementById('startBtn').disabled=false;}

}

async function guess(dir){


  if(!gameActive||acting) return;


  Sound.click();acting=true;setResult('FLIPPING…','idle');

  try{

    const d=await api('/api/games/easy/hilo/guess',{method:'POST',body:JSON.stringify({guess:dir})});

    renderCard('prevCard',currentCard);currentCard=d.new_card;Sound.card();renderCard('currCard',currentCard,true);


    if(d.bust){


      Sound.loss();gameActive=false;addChainPip(false);


      setResult('❌ '+d.new_card.display+' — BUSTED! Chain '+d.chain,'bust');


      flashScreen('r');document.getElementById('btnCashout').disabled=true;


    }else{


      Sound.win();chainLen=d.chain;chainMult=d.multiplier;updateChainDisplay();addChainPip(true);


      updateOdds(d.higher_mult,d.lower_mult);

      updatePotWin(parseInt(document.getElementById('betInp').value)||500,chainMult);

      setResult('✅ '+d.new_card.display+' — Chain '+chainLen+'!','win');

      document.getElementById('btnCashout').disabled=false;flashScreen('g');

      if(document.getElementById('autoCashoutOn').checked){

        const acTarget=parseFloat(document.getElementById('autoCashoutInp').value);

        if(!isNaN(acTarget)&&chainMult>=acTarget) setTimeout(()=>cashout(),100);

      }

    }

  }catch(e){setResult('ERROR: '+e.message,'idle');}

  finally{acting=false;}

}

async function cashout(){


  if(!gameActive||acting) return;


  Sound.click();acting=true;gameActive=false;document.getElementById('btnCashout').disabled=true;

  try{

    const d=await api('/api/games/easy/hilo/cashout',{method:'POST'});

    balance=await refreshBal();updateBal();


    Sound.win();setResult('💰 CASHED OUT — '+chainMult.toFixed(2)+'× · +$'+d.win.toLocaleString(undefined,{maximumFractionDigits:0}),'win');
    if(window.maybeBigWin){const hob=parseInt(document.getElementById('betInp').value)||500;maybeBigWin(hob,d.win);}

  }catch(e){setResult('ERROR: '+e.message,'idle');}

  finally{acting=false;}

}

function renderCard(elId,card,animate=false){

  const el=document.getElementById(elId);const isRed=RED_SUITS.includes(card.suit);

  el.className='playing-card face'+(isRed?' face-red':'')+(animate?' flip-in':'');

  el.innerHTML='';

  const corner=document.createElement('div');corner.className='card-corner';corner.textContent=card.name;

  const cs=document.createElement('div');cs.className='cs';cs.textContent=card.suit;

  corner.appendChild(cs);

  const rankEl=document.createElement('div');rankEl.className='card-rank';rankEl.textContent=card.name;

  const suitEl=document.createElement('div');suitEl.className='card-suit';suitEl.textContent=card.suit;

  el.appendChild(corner);el.appendChild(rankEl);el.appendChild(suitEl);

}

function updateOdds(hm,lm){

  document.getElementById('higherMult').textContent=hm?hm.toFixed(2)+'×':'—';

  document.getElementById('lowerMult').textContent=lm?lm.toFixed(2)+'×':'—';

  document.getElementById('higherPct').textContent=hm?Math.round(96/hm)+'% WIN':'—';

  document.getElementById('lowerPct').textContent=lm?Math.round(96/lm)+'% WIN':'—';

}

function updateChainDisplay(){document.getElementById('chainNum').textContent=chainLen;document.getElementById('chainMult').textContent=chainMult.toFixed(2)+'×';}

function updatePotWin(bet,mult){document.getElementById('potWin').textContent='$'+Math.round(bet*mult).toLocaleString();}

function addChainPip(win){const el=document.createElement('div');el.className='chain-pip '+(win?'win':'bust');el.textContent=win?'✓':'✗';document.getElementById('chainHistory').appendChild(el);}

function setResult(text,cls){const el=document.getElementById('resultLine');el.className='result-line '+cls;el.textContent=text;}

function flashScreen(c){const el=document.getElementById('flash');el.className=c;void el.offsetWidth;el.classList.add('show');}

async function refreshBal(){try{const d=await api('/api/user/me');return d.balance;}catch(e){return balance;}}

async function api(url,opts={}){const r=await fetch(url,{credentials:'include',headers:{'Content-Type':'application/json'},...opts});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||'Error');}return r.json();}

init();

</script>

<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/static/sw.js").catch(function(){})}</script>


<script src="/static/chat.js"></script>


</body>

</html>
