<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎫  Skin Bingo — CS2CaseBot</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#06070a;--accent:#ffd700;--green:#22c55e;--red:#ef4444;--muted:#556;--font:'Orbitron',monospace;}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font);overflow-x:hidden;color:#c8d0e8;}
.hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(6,7,10,0.98);border-bottom:1px solid rgba(255,215,0,0.12);position:sticky;top:0;z-index:50;}
.back{display:flex;align-items:center;gap:5px;color:#2a2a3a;font-size:10px;letter-spacing:1px;text-decoration:none;}
.back svg{width:14px;height:14px;}
.title{flex:1;font-size:14px;font-weight:900;letter-spacing:3px;color:var(--accent);}
.bal{font-size:13px;font-weight:700;color:var(--accent);font-family:monospace;}
.page{max-width:460px;margin:0 auto;padding:16px 14px 100px;}

.pot-hdr{text-align:center;margin-bottom:14px;}
.pot-total{font-size:clamp(30px,9vw,44px);font-weight:900;color:var(--accent);font-family:monospace;line-height:1;}
.pot-label{font-size:9px;letter-spacing:2px;color:var(--muted);margin-top:4px;}
.round-status-banner{text-align:center;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);margin-bottom:10px;}
.round-status-banner.settled{color:var(--green);}
.round-status-banner.cancelled{color:var(--red);}

.join-panel{background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.1);border-radius:14px;padding:16px;margin-bottom:14px;}
.bet-row{display:flex;gap:8px;margin-bottom:10px;}
.bet-row input{flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:#fff;font-family:monospace;font-size:14px;}
.btn-join{width:100%;padding:15px;border:none;border-radius:12px;font-family:var(--font);font-size:12px;font-weight:900;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#7a5c00,var(--accent));color:#06070a;}

.last-ball{text-align:center;margin-bottom:14px;}
.last-ball .lb-num{width:56px;height:56px;border-radius:50%;background:rgba(255,215,0,0.12);border:2px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--accent);font-family:monospace;}
.last-ball .lb-label{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:6px;}

.bingo-header{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:4px;}
.bingo-header div{text-align:center;font-size:14px;font-weight:900;color:var(--accent);}
.bingo-card{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:14px;}
.bingo-cell{aspect-ratio:1;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#ccc;font-family:monospace;}
.bingo-cell.free{background:rgba(255,215,0,0.1);color:var(--accent);font-size:9px;}
.bingo-cell.marked{background:rgba(34,197,94,0.25);border-color:var(--green);color:var(--green);font-weight:900;}

.btn-bingo{width:100%;padding:15px;border:none;border-radius:12px;font-family:var(--font);font-size:12px;font-weight:900;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#1a6b2f,var(--green));color:#06070a;margin-bottom:14px;}
.btn-bingo:disabled{opacity:.35;cursor:not-allowed;}

.players-list{display:flex;flex-direction:column;gap:6px;}
.player-row{display:flex;justify-content:space-between;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px 10px;font-size:10px;color:#aaa;}
.disclaimer-inline{font-size:10px;color:var(--muted);margin-top:18px;text-align:center;line-height:1.5;}
</style>
    <script src="/static/sound.js"></script>
    <script src="/static/big-win.js"></script>
    <script src="/static/balance-animation.js"></script>
    <script src="/static/page-transitions.js"></script>
<link rel="stylesheet" href="/static/games-shared.css"><script src="/static/js/csrf.js"></script>
</head>
<body>

<header class="hdr">
  <a class="back" href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>GAMES</a>
  <span class="title">🎫  SKIN BINGO</span>
  <span class="bal" id="balDisplay">$—</span>
</header>

<div class="page">

  <div class="pot-hdr">
    <div class="pot-total" id="potTotal">$0.00</div>
    <div class="pot-label">FIRST COMPLETE LINE WINS THE POT</div>
  </div>
  <div class="round-status-banner" id="roundStatusBanner">WAITING FOR PLAYERS</div>

  <div class="join-panel" id="joinPanel">
    <div class="bet-row"><input type="number" id="entryInput" value="100" min="50" max="750000"></div>
    <button class="btn-join" onclick="joinRound()">🎫  JOIN — GET A CARD</button>
  </div>

  <div id="gameArea" style="display:none;">
    <div class="last-ball" id="lastBallArea" style="display:none;">
      <div class="lb-num" id="lastBallNum">?</div>
      <div class="lb-label">LAST BALL DRAWN</div>
    </div>

    <div class="bingo-header">
      <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
    </div>
    <div class="bingo-card" id="bingoCard"></div>

    <button class="btn-bingo" id="bingoBtn" onclick="claimBingo()">🎉 BINGO!</button>
  </div>

  <div class="players-list" id="playersList"></div>

  <div class="disclaimer-inline">⚠️ One shared stream of drawn numbers, everyone plays their own card against it. First valid line claim takes the whole pot. This is a simulation; balances have no real-world value.</div>
</div>

<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let balance = 0, myUserId = null;
let balDisplayInited = false;
let currentRoundId = null;
let ws = null;
let myCard = null;
let drawnSet = new Set();
let myBetAmount = 0;

async function init(){
  try{ const d = await api('/api/user/me'); balance = d.balance; myUserId = String(d.user_id); updateBal(); }catch(e){}
  const params = new URLSearchParams(location.search);
  const roundParam = params.get('round');
  await joinOpenRound(roundParam ? Number(roundParam) : null);
}

async function joinOpenRound(roundId){
  try{
    const data = await api('/api/games/skin-bingo/rounds');
    if (roundId){ enterRound(roundId, null); return; }
    if (data.rounds && data.rounds.length){ enterRound(data.rounds[0].round_id, null); }
  }catch(e){}
}

function updateBal(){
  const e = document.getElementById('balDisplay');
  const n = '$'+balance.toLocaleString(undefined,{maximumFractionDigits:0});
  if (balDisplayInited && window.animateBalance) { animateBalance(e, e.textContent, n, true); }
  else { e.textContent = n; }
  balDisplayInited = true;
}
async function refreshBal(){ try{ const d = await api('/api/user/me'); return d.balance; }catch(e){ return balance; } }

async function joinRound(){
  const amount = parseFloat(document.getElementById('entryInput').value) || 100;
  try{
    const body = { amount };
    if (currentRoundId) body.round_id = currentRoundId;
    const data = await api('/api/games/skin-bingo/join', { method: 'POST', body: JSON.stringify(body) });
    myBetAmount = amount;
    balance = await refreshBal(); updateBal();
    myCard = data.card;
    document.getElementById('joinPanel').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    renderCard();
    enterRound(data.round_id, data.round);
  }catch(e){
    showToast(e.message || 'Could not join');
  }
}

function renderCard(){
  const grid = document.getElementById('bingoCard');
  let html = '';
  for (let row = 0; row < 5; row++){
    for (let col = 0; col < 5; col++){
      const n = myCard[row][col];
      if (n === null){
        html += `<div class="bingo-cell free">FREE</div>`;
      } else {
        const marked = drawnSet.has(n);
        html += `<div class="bingo-cell ${marked ? 'marked' : ''}" id="cell-${n}">${n}</div>`;
      }
    }
  }
  grid.innerHTML = html;
}

function enterRound(roundId, round){
  if (currentRoundId === roundId && ws) return;
  currentRoundId = roundId;
  if (round) renderRound(round);
  connectWS(roundId);
}

function renderRound(round){
  document.getElementById('potTotal').textContent = '$' + Number(round.pot || 0).toFixed(2);
  const banner = document.getElementById('roundStatusBanner');
  banner.className = 'round-status-banner ' + round.status;
  banner.textContent = round.status === 'drawing' ? (round.drawn_numbers && round.drawn_numbers.length ? 'DRAWING…' : 'WAITING FOR PLAYERS')
                      : round.status === 'settled' ? 'BINGO! ROUND COMPLETE' : 'CANCELLED — REFUNDED';

  if (round.drawn_numbers){
    drawnSet = new Set(round.drawn_numbers);
    if (myCard) renderCard();
  }

  const list = document.getElementById('playersList');
  list.innerHTML = (round.players || []).map(p => `
    <div class="player-row">
      <span>${esc(p.username || 'Player')}</span>
      <span>$${Number(p.entry_fee).toFixed(2)} entry</span>
    </div>
  `).join('') || '<div style="color:var(--muted);font-size:10px;">No one playing yet.</div>';
}

async function claimBingo(){
  if (!currentRoundId) return;
  document.getElementById('bingoBtn').disabled = true;
  try{
    await api('/api/games/skin-bingo/bingo', { method: 'POST', body: JSON.stringify({ round_id: currentRoundId }) });
  }catch(e){
    showToast(e.message || 'Not a valid Bingo yet');
    document.getElementById('bingoBtn').disabled = false;
  }
}

function connectWS(roundId){
  closeWS();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/api/games/skin-bingo/ws/' + roundId);
  ws.onmessage = (ev) => handleWSMsg(JSON.parse(ev.data));
  ws.onclose = () => { if (currentRoundId === roundId) setTimeout(() => { if (currentRoundId === roundId) connectWS(roundId); }, 2000); };
}
function closeWS(){ if (ws) { try{ ws.close(); }catch(e){} ws = null; } }

function handleWSMsg(msg){
  if (msg.type === 'room_state' || msg.type === 'player_joined'){
    renderRound(msg.round || msg);
  } else if (msg.type === 'ball_drawn'){
    document.getElementById('lastBallArea').style.display = 'block';
    document.getElementById('lastBallNum').textContent = msg.number;
    document.getElementById('roundStatusBanner').textContent = 'DRAWING…';
    drawnSet = new Set(msg.drawn_numbers);
    if (myCard) renderCard();
    Sound && Sound.click && Sound.click();
  } else if (msg.type === 'bingo'){
    onBingo(msg);
  } else if (msg.type === 'cancelled'){
    onCancelled(msg);
  }
}

async function onBingo(msg){
  renderRound(msg);
  balance = await refreshBal(); updateBal();
  const iWon = String(msg.winner_id) === myUserId;
  if (iWon){
    Sound && Sound.win && Sound.win();
    spawnConfettiSafe();
    showToast(`BINGO! You won the pot: $${Number(msg.win).toFixed(2)}!`);
    if (window.maybeBigWin) maybeBigWin(myBetAmount, msg.win);
  } else {
    Sound && Sound.loss && Sound.loss();
    showToast('Someone else called Bingo first!');
  }
  resetToLobbyAfter();
}

async function onCancelled(msg){
  document.getElementById('roundStatusBanner').className = 'round-status-banner cancelled';
  document.getElementById('roundStatusBanner').textContent = 'CANCELLED — ALL BALLS DRAWN, REFUNDED';
  balance = await refreshBal(); updateBal();
  resetToLobbyAfter();
}

function resetToLobbyAfter(){
  setTimeout(() => {
    closeWS();
    currentRoundId = null;
    myCard = null;
    drawnSet = new Set();
    document.getElementById('joinPanel').style.display = 'block';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('lastBallArea').style.display = 'none';
    document.getElementById('bingoBtn').disabled = false;
    joinOpenRound(null);
  }, 4000);
}

function spawnConfettiSafe(){
  try{ if (window.spawnConfettiExplosion) spawnConfettiExplosion(); else if (window.spawnConfetti) spawnConfetti('Gold', 60); }catch(e){}
}

function showToast(msg){
  let t = document.getElementById('bingoToast');
  if (!t){
    t = document.createElement('div');
    t.id = 'bingoToast';
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.95);border:1px solid rgba(255,215,0,0.3);color:#fff;padding:10px 18px;border-radius:10px;font-size:11px;z-index:500;max-width:90vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

async function api(url, opts = {}){
  const r = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok){ const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Error'); }
  return r.json();
}

init();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/static/sw.js").catch(function(){})}</script>
<script src="/static/chat.js"></script>

</body>
</html>
